-4--gpt-4o", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 22 (P3)</strong> — OpenAI API Deep Dive (GPT-4, GPT-4o). Tools focus: <em>openai Python SDK</em>. Core path — prioritize in your sprint.</p><p>OpenAI's API is the reference stack for chat completions, structured outputs, embeddings, and tool calls in many production systems. You learn authentication, model selection, streaming vs batch, and how errors surface (rate limits, context length, content policy).</p><p>Compare latency and cost across models in the same family (e.g. mini vs full) for your own prompt shapes. Log request IDs and token usage so you can explain spend to stakeholders.</p><ul><li>Configure <code>OPENAI_API_KEY</code> from the environment — never commit keys.</li><li>Use the official SDK; handle retries with exponential backoff.</li><li>Document which model you chose and why (quality, speed, price).</li></ul></div></div>", "steps": "<ol><li>Create a project API key in the OpenAI console; store it as an environment variable only.</li><li>Install the official SDK for your language; run a minimal chat completion against a small model.</li><li>Add structured logging: model name, latency, input/output token counts (no raw PII in logs).</li><li>Call the same prompt with two model sizes; compare quality, latency, and documented pricing.</li><li>Write a short openai Python SDK integration note: error codes you saw and how you handled them.</li></ol>", "code": "import os\n# Use env vars — never commit keys\nfrom openai import OpenAI\nclient = OpenAI(api_key=os.environ.get(\"OPENAI_API_KEY\"))\nr = client.chat.completions.create(\n    model=\"gpt-4o-mini\",\n    messages=[{\"role\": \"user\", \"content\": \"Hello from module 22!\"}],\n)\nprint(r.choices[0].message.content)", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://platform.openai.com/docs/api-reference\" target=\"_blank\" rel=\"noopener\">OpenAI API reference ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/openai/openai-python\" target=\"_blank\" rel=\"noopener\">openai-python ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.mozilla.org/en-US/docs/Web/HTTP/Overview\" target=\"_blank\" rel=\"noopener\">MDN — HTTP overview ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-project-api-security/\" target=\"_blank\" rel=\"noopener\">OWASP — API security ↗</a></li><li><a class=\"ext-link\" href=\"https://json-schema.org/\" target=\"_blank\" rel=\"noopener\">JSON Schema ↗</a></li><li><a class=\"ext-link\" href=\"https://swagger.io/specification/\" target=\"_blank\" rel=\"noopener\">OpenAPI specification ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 22 (P3)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m022.json or References tab."}, {"id": 22, "num": 23, "title": "Anthropic Claude API", "tools": "anthropic Python SDK", "priority": "MUST DO", "phase": "P3", "slug": "anthropic-claude-api", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 23 (P3)</strong> — Anthropic Claude API. Tools focus: <em>anthropic Python SDK</em>. Core path — prioritize in your sprint.</p><p>Anthropic's API is the reference stack for chat completions, structured outputs, embeddings, and tool calls in many production systems. You learn authentication, model selection, streaming vs batch, and how errors surface (rate limits, context length, content policy).</p><p>Compare latency and cost across models in the same family (e.g. mini vs full) for your own prompt shapes. Log request IDs and token usage so you can explain spend to stakeholders.</p><ul><li>Configure <code>ANTHROPIC_API_KEY</code> from the environment — never commit keys.</li><li>Use the official SDK; handle retries with exponential backoff.</li><li>Document which model you chose and why (quality, speed, price).</li></ul></div></div>", "steps": "<ol><li>Create a project API key in the Anthropic console; store it as an environment variable only.</li><li>Install the official SDK for your language; run a minimal chat completion against a small model.</li><li>Add structured logging: model name, latency, input/output token counts (no raw PII in logs).</li><li>Call the same prompt with two model sizes; compare quality, latency, and documented pricing.</li><li>Write a short anthropic Python SDK integration note: error codes you saw and how you handled them.</li></ol>", "code": "import os\n# Use env vars — never commit keys\nfrom openai import OpenAI\nclient = OpenAI(api_key=os.environ.get(\"OPENAI_API_KEY\"))\nr = client.chat.completions.create(\n    model=\"gpt-4o-mini\",\n    messages=[{\"role\": \"user\", \"content\": \"Hello from module 23!\"}],\n)\nprint(r.choices[0].message.content)", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://docs.anthropic.com/en/api/getting-started\" target=\"_blank\" rel=\"noopener\">Anthropic API ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/anthropics/anthropic-sdk-python\" target=\"_blank\" rel=\"noopener\">anthropic-sdk-python ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.mozilla.org/en-US/docs/Web/HTTP/Overview\" target=\"_blank\" rel=\"noopener\">MDN — HTTP overview ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-project-api-security/\" target=\"_blank\" rel=\"noopener\">OWASP — API security ↗</a></li><li><a class=\"ext-link\" href=\"https://json-schema.org/\" target=\"_blank\" rel=\"noopener\">JSON Schema ↗</a></li><li><a class=\"ext-link\" href=\"https://swagger.io/specification/\" target=\"_blank\" rel=\"noopener\">OpenAPI specification ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 23 (P3)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m023.json or References tab."}, {"id": 23, "num": 24, "title": "Google Gemini API", "tools": "google-generativeai", "priority": "MUST DO", "phase": "P3", "slug": "google-gemini-api", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 24 (P3)</strong> — Google Gemini API. Tools focus: <em>google-generativeai</em>. Core path — prioritize in your sprint.</p><p>Google’s Gemini API exposes multimodal and long-context models with a distinct SDK surface from OpenAI. You learn API keys via AI Studio, model IDs, safety settings, and quota dashboards.</p><p>Compare request/response shapes to OpenAI for the same task; note tool and JSON schema support per model generation.</p><ul><li>Store keys in <code>GOOGLE_API_KEY</code> or the env var your SDK expects.</li><li>Log model id + latency; avoid logging user media bytes.</li></ul></div></div>", "steps": "<ol><li>Create a key in Google AI Studio; export it to your shell environment only.</li><li>Install google-genai or google-generativeai per current docs; list models available to your project.</li><li>Run text and (if available) one image+text call; capture latency.</li><li>Try structured output or function calling if supported on your chosen model.</li><li>Write integration notes: differences vs OpenAI that would affect a shared abstraction.</li></ol>", "code": "import os\n# Use env vars — never commit keys\nfrom openai import OpenAI\nclient = OpenAI(api_key=os.environ.get(\"OPENAI_API_KEY\"))\nr = client.chat.completions.create(\n    model=\"gpt-4o-mini\",\n    messages=[{\"role\": \"user\", \"content\": \"Hello from module 24!\"}],\n)\nprint(r.choices[0].message.content)", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://ai.google.dev/gemini-api/docs\" target=\"_blank\" rel=\"noopener\">Gemini API ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/googleapis/python-genai\" target=\"_blank\" rel=\"noopener\">google-genai SDK ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.mozilla.org/en-US/docs/Web/HTTP/Overview\" target=\"_blank\" rel=\"noopener\">MDN — HTTP overview ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-project-api-security/\" target=\"_blank\" rel=\"noopener\">OWASP — API security ↗</a></li><li><a class=\"ext-link\" href=\"https://json-schema.org/\" target=\"_blank\" rel=\"noopener\">JSON Schema ↗</a></li><li><a class=\"ext-link\" href=\"https://swagger.io/specification/\" target=\"_blank\" rel=\"noopener\">OpenAPI specification ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 24 (P3)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m024.json or References tab."}, {"id": 24, "num": 25, "title": "Mistral & Open Source LLMs (LLaMA, DeepSeek)", "tools": "Hugging Face, mistralai SDK", "priority": "MUST DO", "phase": "P3", "slug": "mistral---open-source-llms--llama--deepseek", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 25 (P3)</strong> — Mistral &amp; Open Source LLMs (LLaMA, DeepSeek). Tools focus: <em>Hugging Face, mistralai SDK</em>. Core path — prioritize in your sprint.</p><p>Mistral’s hosted API and open-weights families (e.g. LLaMA-class, DeepSeek-class on Hugging Face) span commercial keys and self-hosted inference. Understand license tags, gated models, and HF tokens for downloads.</p><p>Practice one hosted completion and one local or HF inference path so you can advise clients on lock-in vs control.</p></div></div>", "steps": "<ol><li>Create a Mistral API key or HF token; never commit either.</li><li>Call a Mistral chat model via official SDK or HTTP.</li><li>Pull a small open model card on Hugging Face; read license and use restrictions.</li><li>Run a minimal generate call locally or via inference endpoint if feasible.</li><li>Summarize when you would recommend API vs self-host for a regulated client.</li></ol>", "code": "# Module 25 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 25, \"topic\": \"Mistral & Open Source LLMs (LLaMA, DeepS\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://docs.mistral.ai/\" target=\"_blank\" rel=\"noopener\">Mistral AI — API ↗</a></li><li><a class=\"ext-link\" href=\"https://huggingface.co/docs/huggingface_hub/en/guides/inference\" target=\"_blank\" rel=\"noopener\">Hugging Face — inference ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.mozilla.org/en-US/docs/Web/HTTP/Overview\" target=\"_blank\" rel=\"noopener\">MDN — HTTP overview ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-project-api-security/\" target=\"_blank\" rel=\"noopener\">OWASP — API security ↗</a></li><li><a class=\"ext-link\" href=\"https://json-schema.org/\" target=\"_blank\" rel=\"noopener\">JSON Schema ↗</a></li><li><a class=\"ext-link\" href=\"https://swagger.io/specification/\" target=\"_blank\" rel=\"noopener\">OpenAPI specification ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 25 (P3)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m025.json or References tab."}, {"id": 25, "num": 26, "title": "API Authentication & Rate Limiting", "tools": "API keys, backoff, tenacity", "priority": "MUST DO", "phase": "P3", "slug": "api-authentication---rate-limiting", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 26 (P3)</strong> — API Authentication &amp; Rate Limiting. Tools focus: <em>API keys, backoff, tenacity</em>. Core path — prioritize in your sprint.</p><p>Production API usage requires key rotation, least privilege keys, exponential backoff on 429/5xx, and idempotency for retried writes. Centralize secrets in vaults or managed stores.</p><p>Practice reading Retry-After headers and structuring tenacity (or equivalent) policies.</p></div></div>", "steps": "<ol><li>Implement retries with jitter; never retry non-idempotent POSTs blindly without design.</li><li>Log HTTP status and request id only — not payloads with PII.</li><li>Simulate rate limits with a mock server or tiny limit in a test key.</li><li>Document key rotation procedure for your team (who, how often, blast radius).</li><li>Add a circuit breaker sketch: after N failures, fail fast and alert.</li></ol>", "code": "import os\n# Use env vars — never commit keys\nfrom openai import OpenAI\nclient = OpenAI(api_key=os.environ.get(\"OPENAI_API_KEY\"))\nr = client.chat.completions.create(\n    model=\"gpt-4o-mini\",\n    messages=[{\"role\": \"user\", \"content\": \"Hello from module 26!\"}],\n)\nprint(r.choices[0].message.content)", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://platform.openai.com/docs/guides/rate-limits\" target=\"_blank\" rel=\"noopener\">OpenAI — rate limits ↗</a></li><li><a class=\"ext-link\" href=\"https://tenacity.readthedocs.io/en/latest/\" target=\"_blank\" rel=\"noopener\">tenacity ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.mozilla.org/en-US/docs/Web/HTTP/Overview\" target=\"_blank\" rel=\"noopener\">MDN — HTTP overview ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-project-api-security/\" target=\"_blank\" rel=\"noopener\">OWASP — API security ↗</a></li><li><a class=\"ext-link\" href=\"https://json-schema.org/\" target=\"_blank\" rel=\"noopener\">JSON Schema ↗</a></li><li><a class=\"ext-link\" href=\"https://swagger.io/specification/\" target=\"_blank\" rel=\"noopener\">OpenAPI specification ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 26 (P3)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m026.json or References tab."}, {"id": 26, "num": 27, "title": "Toolformer / Function Calling", "tools": "OpenAI tools, Claude tool_use", "priority": "MUST DO", "phase": "P3", "slug": "toolformer---function-calling", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 27 (P3)</strong> — Toolformer / Function Calling. Tools focus: <em>OpenAI tools, Claude tool_use</em>. Core path — prioritize in your sprint.</p><p>Tool / function calling lets models emit structured actions the runtime executes. Schemas must be tight: enums, descriptions, and required fields reduce hallucinated arguments.</p></div></div>", "steps": "<ol><li>Define one JSON schema tool; register it with the provider SDK you use.</li><li>Handle tool_calls in a loop until the model returns user-visible content.</li><li>Test three successful calls and two invalid-args paths; verify error handling.</li><li>Compare parallel vs serial tool execution for your use case.</li><li>Document trust boundaries: which tools can touch production data?</li></ol>", "code": "# Module 27 — hands-on checkpoint\ndef delive /the-book-2nd.html\" target=\"_blank\" rel=\"noopener\">Berkeley — RL book (Sutton & Barto) ↗</a></li><li><a class=\"ext-link\" href=\"https://learn.microsoft.com/en-us/azure/architecture/ai-ml/guide/ai-agent-design\" target=\"_blank\" rel=\"noopener\">Microsoft — autonomous agents overview ↗</a></li><li><a class=\"ext-link\" href=\"https://arxiv.org/abs/2210.03629\" target=\"_blank\" rel=\"noopener\">ReAct paper ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 36 (P4)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m036.json or References tab."}]}, {"code": "P5", "name": "Tool Use & Integration", "purpose": "Memory, APIs, files, search, browsing", "icon": "🛠️", "color": "mc-5", "modules": [{"id": 36, "num": 37, "title": "Tool Use System Design", "tools": "OpenAI tools, LangChain tools", "priority": "MUST DO", "phase": "P5", "slug": "tool-use-system-design", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 37 (P5)</strong> — Tool Use System Design. Tools focus: <em>OpenAI tools, LangChain tools</em>. Core path — prioritize in your sprint.</p><p>Memory types: short-term (conversation buffer), long-term (vector store of facts), episodic (past task traces). Stale memory hurts — TTLs and provenance matter.</p></div></div>", "steps": "<ol><li>Choose one memory backend; store three synthetic “facts” with metadata.</li><li>Retrieve with a natural-language query; verify precision.</li><li>Expire or update one fact; confirm retrieval changes.</li><li>Log memory writes with source and timestamp.</li><li>List privacy implications of long-term user memory.</li></ol>", "code": "# Module 37 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 37, \"topic\": \"Tool Use System Design\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://platform.openai.com/docs/guides/function-calling\" target=\"_blank\" rel=\"noopener\">OpenAI — tools ↗</a></li><li><a class=\"ext-link\" href=\"https://python.langchain.com/docs/concepts/tools/\" target=\"_blank\" rel=\"noopener\">LangChain — tools ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.mozilla.org/en-US/docs/Web/HTTP/Caching\" target=\"_blank\" rel=\"noopener\">Mozilla — HTTP caching ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-community/attacks/Server_Side_Request_Forgery\" target=\"_blank\" rel=\"noopener\">OWASP — SSRF ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.python.org/3/library/pathlib.html\" target=\"_blank\" rel=\"noopener\">Python — pathlib ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-project-secure-coding-practices-quick-reference-guide/\" target=\"_blank\" rel=\"noopener\">OWASP — secure coding ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 37 (P5)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m037.json or References tab."}, {"id": 37, "num": 38, "title": "Memory Integration (Short/Long-Term/Episodic)", "tools": "LangChain Memory, mem0", "priority": "MUST DO", "phase": "P5", "slug": "memory-integration--short-long-term-episodic", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 38 (P5)</strong> — Memory Integration (Short/Long-Term/Episodic). Tools focus: <em>LangChain Memory, mem0</em>. Core path — prioritize in your sprint.</p><p>Calling HTTP APIs from agents requires URL validation, SSRF protection, timeouts, and response size limits. Prefer typed clients (httpx) over ad-hoc requests in prompts.</p></div></div>", "steps": "<ol><li>Wrap httpx calls with timeout + max bytes read.</li><li>Block private IP ranges in a URL validator unittest.</li><li>Parse JSON safely; handle HTML error pages.</li><li>Add redaction of auth headers in logs.</li><li>Document retry policy for idempotent GETs only.</li></ol>", "code": "# Module 38 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 38, \"topic\": \"Memory Integration (Short/Long-Term/Epis\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://python.langchain.com/docs/concepts/memory/\" target=\"_blank\" rel=\"noopener\">LangChain — memory ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.mem0.ai/\" target=\"_blank\" rel=\"noopener\">mem0 ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.mozilla.org/en-US/docs/Web/HTTP/Caching\" target=\"_blank\" rel=\"noopener\">Mozilla — HTTP caching ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-community/attacks/Server_Side_Request_Forgery\" target=\"_blank\" rel=\"noopener\">OWASP — SSRF ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.python.org/3/library/pathlib.html\" target=\"_blank\" rel=\"noopener\">Python — pathlib ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-project-secure-coding-practices-quick-reference-guide/\" target=\"_blank\" rel=\"noopener\">OWASP — secure coding ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 38 (P5)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m038.json or References tab."}, {"id": 38, "num": 39, "title": "External API Calling from Agents", "tools": "requests, httpx, LangChain", "priority": "MUST DO", "phase": "P5", "slug": "external-api-calling-from-agents", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 39 (P5)</strong> — External API Calling from Agents. Tools focus: <em>requests, httpx, LangChain</em>. Core path — prioritize in your sprint.</p><p>File tools read/write user or system files — highest risk surface. Sandboxed paths, extension allowlists, and size caps reduce exfiltration and destructive writes.</p></div></div>", "steps": "<ol><li>Constrain reads to a single workspace directory in code.</li><li>Reject symlinks escaping the workspace.</li><li>Implement write with backup or dry-run mode.</li><li>Test with oversized file and binary file edge cases.</li><li>Describe how you’d add virus scanning for uploads in production.</li></ol>", "code": "import os\n# Use env vars — never commit keys\nfrom openai import OpenAI\nclient = OpenAI(api_key=os.environ.get(\"OPENAI_API_KEY\"))\nr = client.chat.completions.create(\n    model=\"gpt-4o-mini\",\n    messages=[{\"role\": \"user\", \"content\": \"Hello from module 39!\"}],\n)\nprint(r.choices[0].message.content)", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://www.python-httpx.org/\" target=\"_blank\" rel=\"noopener\">httpx ↗</a></li><li><a class=\"ext-link\" href=\"https://requests.readthedocs.io/en/latest/\" target=\"_blank\" rel=\"noopener\">Requests ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.mozilla.org/en-US/docs/Web/HTTP/Caching\" target=\"_blank\" rel=\"noopener\">Mozilla — HTTP caching ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-community/attacks/Server_Side_Request_ ccess---sampling-in-mcp", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 65 (P8)</strong> — Secure File Access &amp; Sampling in MCP. Tools focus: <em>MCP server Python</em>. Core path — prioritize in your sprint.</p><p>Sampling and filesystem rules gate model access to local resources. Least privilege defaults beat “allow all” demos.</p></div></div>", "steps": "<ol><li>Enable directory allowlist in a sample server config.</li><li>Attempt disallowed path access; confirm denial.</li><li>Review sampling callbacks — when human approval triggers.</li><li>Document audit log fields you would ship.</li><li>Red-team prompt injection via malicious file contents.</li></ol>", "code": "pip install mcp\n# FastMCP minimal pattern (stdio server)\nfrom mcp.server.fastmcp import FastMCP\nmcp = FastMCP(\"demo\")\n@mcp.tool()\ndef add(a: int, b: int) -> int:\n    \"\"\"Add two numbers.\"\"\"\n    return a + b\nif __name__ == \"__main__\":\n    mcp.run(transport=\"stdio\")", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://modelcontextprotocol.io/\" target=\"_blank\" rel=\"noopener\">MCP — documentation ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/modelcontextprotocol/specification\" target=\"_blank\" rel=\"noopener\">MCP — specification ↗</a></li><li><a class=\"ext-link\" href=\"https://www.anthropic.com/news/model-context-protocol\" target=\"_blank\" rel=\"noopener\">Anthropic — MCP announcement ↗</a></li><li><a class=\"ext-link\" href=\"https://www.jsonrpc.org/specification\" target=\"_blank\" rel=\"noopener\">JSON-RPC 2.0 spec ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-project-top-10-for-large-language-model-applications/\" target=\"_blank\" rel=\"noopener\">OWASP — LLM Top 10 ↗</a>< el=\"noopener\">Official MCP servers ↗</a></li><li><a class=\"ext-link\" href=\"https://www.anthropic.com/news/model-context-protocol\" target=\"_blank\" rel=\"noopener\">Anthropic — MCP announcement ↗</a></li><li><a class=\"ext-link\" href=\"https://www.jsonrpc.org/specification\" target=\"_blank\" rel=\"noopener\">JSON-RPC 2.0 spec ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-project-top-10-for-large-language-model-applications/\" target=\"_blank\" rel=\"noopener\">OWASP — LLM Top 10 ↗</a></li><li><a class=\"ext-link\" href=\"https://www.cncf.io/\" target=\"_blank\" rel=\"noopener\">CNCF — security landscape ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 66 (P8)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m066.json or References tab."}, {"id": 66, "num": 67, "title": "Building a Custom MCP Server (Python)", "tools": "mcp, fastapi, Python", "priority": "MUST DO", "phase": "P8", "slug": "building-a-custom-mcp-server--python", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 67 (P8)</strong> — Building a Custom MCP Server (Python). Tools focus: <em>mcp, fastapi, Python</em>. Core path — prioritize in your sprint.</p><p>Custom Python MCP servers often use FastMCP or official SDK. Package as CLI entrypoints; pin dependencies for reproducibility.</p></div></div>", "steps": "<ol><li>Scaffold a server exposing two tools (read-only).</li><li>Add unit tests mocking transport.</li><li>Dockerfile optional: non-root user, read-only FS where possible.</li><li>Publish README with install + config snippet.</li><li>Peer review tool descriptions for ambiguity.</li></ol>", "code": "pip install mcp\n# FastMCP minimal pattern (stdio server)\nfrom mcp.server.fastmcp import FastMCP\nmcp = FastMCP(\"demo\")\n@mcp.tool()\ndef add(a: int, b: int) -> int:\n    \"\"\"Add two numbers.\"\"\"\n    return a + b\nif __name__ == \"__main__\":\n    mcp.run(transport=\"stdio\")", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://github.com/jlowin/fastmcp\" target=\"_blank\" rel=\"noopener\">FastMCP ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/modelcontextprotocol/python-sdk\" target=\"_blank\" rel=\"noopener\">MCP Python SDK ↗</a></li><li><a class=\"ext-link\" href=\"https://www.anthropic.com/news/model-context-protocol\" target=\"_blank\" rel=\"noopener\">Anthropic — MCP announcement ↗</a></li><li><a class=\"ext-link\" href=\"https://www.jsonrpc.org/specification\" target=\"_blank\" rel=\"noopener\">JSON-RPC 2.0 spec ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-project-top-10-for-large-language-model-applications/\" target=\"_blank\" rel=\"noopener\">OWASP — LLM Top 10 ↗</a></li><li><a class=\"ext-link\" href=\"https://www.cncf.io/\" target=\"_blank\" rel=\"noopener\">CNCF — security landscape ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 67 (P8)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m067.json or References tab."}, {"id": 67, "num": 68, "title": "MCP Integrations: S3, Stripe, Databases", "tools": "boto3, stripe, psycopg2 + MCP", "priority": "MUST DO", "phase": "P8", "slug": "mcp-integrations--s3--stripe--databases", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 68 (P8)</strong> — MCP Integrations: S3, Stripe, Databases. Tools focus: <em>boto3, stripe, psycopg2 + MCP</em>. Core path — prioritize in your sprint.</p><p>Integrations (S3, Stripe, Postgres) mean secrets, idempotency, and least privilege IAM. Never pass raw credentials through the model; server holds keys.</p></div></div>", "steps": "<ol><li>Design IAM policy for S3 read-only prefix.</li><li>Sketch Stripe flow with idempotency keys on writes.</li><li>Use parameterized SQL only against Postgres tool.</li><li>Log request metadata without card or PII payloads.</li><li>Tabletop abuse: refund fraud prompt scenario.</li></ol>", "code": "pip install mcp\n# FastMCP minimal pattern (stdio server)\nfrom mcp.server.fastmcp import FastMCP\nmcp = FastMCP(\"demo\")\n@mcp.tool()\ndef add(a: int, b: int) -> int:\n    \"\"\"Add two numbers.\"\"\"\n    return a + b\nif __name__ == \"__main__\":\n    mcp.run(transport=\"stdio\")", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://boto3.amazonaws.com/v1/documentation/api/latest/reference/services/s3.html\" target=\"_blank\" rel=\"noopener\">boto3 S3 ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.stripe.com/api\" target=\"_blank\" rel=\"noopener\">Stripe API ↗</a></li><li><a class=\"ext-link\" href=\"https://www.psycopg.org/docs/\" target=\"_blank\" rel=\"noopener\">psycopg ↗</a></li><li><a class=\"ext-link\" href=\"https://www.anthropic.com/news/model-context-protocol\" target=\"_blank\" rel=\"noopener\">Anthropic — MCP announcement ↗</a></li><li><a class=\"ext-link\" href=\"https://www.jsonrpc.org/specification\" target=\"_blank\" rel=\"noopener\">JSON-RPC 2.0 spec ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-project-top-10-for-large-language-model-applications/\" target=\"_blank\" rel=\"noopener\">OWASP — LLM Top 10 ↗</a></li><li><a class=\"ext-link\" href=\"https://www.cncf.io/\" target=\"_blank\" rel=\"noopener\">CNCF — security landscape ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.stripe.com/testing\" target=\"_blank\" rel=\"noopener\">Stripe — testing ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 68 (P8)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m068.json or References tab."}, {"id": 68, "num": 69, "title": "Claude Desktop + MCP Full Setup", "tools": "Claude Desktop, mcp config", "priority": "MUST DO", "phase": "P8", "slug": "claude-desktop---mcp-full-setup", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 69 (P8)</strong> — Claude Desktop + MCP Full Setup. Tools focus: <em>Claude Desktop, mcp config</em>. Core path — prioritize in your sprint.</p><p>Claude Desktop + MCP is the fastest way to feel the protocol. JSON config, absolute paths, and env vars are the usual friction points.</p></div></div>", "steps": "<ol><li>Install Claude Desktop; locate MCP config file for your OS.</li><li>Add one community server with narrow permissions.</li><li>Restart; validate tools appear and run a harmless call.</li><li>Snapshot working config (redacted) for teammates.</li><li>Write troubleshooting FAQ from errors you actually saw.</li></ol>", "code": "import os\n# Use env vars — never commit keys\nfrom openai import OpenAI\nclient = OpenAI(api_key=os.environ.get(\"OPENAI_API_KEY\"))\nr = client.chat.completions.create(\n    model=\"gpt-4o-mini\",\n    messages=[{\"role\": \"user\", \"content\": \"Hello from module 69!\"}],\n)\nprint(r.choices[0].message.content)", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://claude.ai/download\" target=\"_blank\" rel=\"noopener\">Claude Desktop ↗</a></li><li><a class=\"ext-link\" href=\"https://modelcontextprotocol.io/quickstart\" target=\"_blank\" rel=\"noopener\">MCP — quickstart ↗</a></li><li><a class=\"ext-link\" href=\"https://www.anthropic.com/news/model-context-protocol\" target=\"_blank\" rel=\"noopener\">Anthropic — MCP announcement ↗</a></li><li><a class=\"ext-link\" href=\"https://www.jsonrpc.org/specification\" target=\"_blank\" rel=\"noopener\">JSON-RPC 2.0 spec ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/www-project-top-10-for-large-language-model-applications/\" target=\"_blank\" rel=\"noopener\">OWASP — LLM Top 10 ↗</a></li><li><a class=\"ext-link\" href=\"https://www.cncf.io/\" target=\"_blank\" rel=\"noopener\">CNCF — security landscape ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 69 (P8)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m069.json or References tab."}]}, {"code": "P9", "name": "A2A Protocol", "purpose": "Agent-to-agent communication", "icon": "🌐", "color": "mc-8", "modules": [{"id": 69, "num": 70, "title": "A2A Protocol Architecture", "tools": "A2A spec, Python", "priority": "MUST DO", "phase": "P9", "slug": "a2a-protocol-architecture", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 70 (P9)</strong> — A2A Protocol Architecture. Tools focus: <em>A2A spec, Python</em>. Core path — prioritize in your sprint.</p><p>Google’s Agent2Agent (A2A) protocol focuses on discoverable agents, task messages, and artifacts — complementary to MCP’s tool/resource model. Study how remote agents authenticate and negotiate capabilities.</p></div></div>", "steps": "<ol><li>Read A2A intro materials; contrast goals with MCP in one paragraph.</li><li>List actors: client, remote agent, registry (if used).</li><li>Sketch sequence diagram for a task submission and artifact return.</li><li>Identify transport and auth questions unanswered by skimming docs.</li><li>Note version skew risks between agent implementations.</li></ol>", "code": "# Pseudocode: agent card JSON for discovery (follow latest A2A spec)\nAGENT_CARD = {\n  \"name\": \"research-agent\",\n  \"skills\": [{\"id\": \"web.search\", \"description\": \"Search and summarize\"}],\n  \"endpoints\": {\"tasks\": \"http://localhost:9100/tasks\"}\n}\nimport json; print(json.dumps(AGENT_CARD, indent=2))", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://github.com/google/A2A\" target=\"_blank\" rel=\"noopener\">A2A — Google repo ↗</a></li><li><a class=\"ext-link\" href=\"https://a2a-protocol.org/\" target=\"_blank\" rel=\"noopener\">A2A — site ↗</a></li><li><a class=\"ext-link\" href=\"https://cloud.google.com/blog/products/ai-machine-learning/a2a-a-new-era-of-agent-interoperability\" target=\"_blank\" rel=\"noopener\">Google Cloud — A2A blog ↗</a></li><li><a class=\"ext-link\" href=\"https://datatracker.ietf.org/doc/html/rfc7519\" target=\"_blank\" rel=\"noopener\">IETF — JSON Web Token ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/API-Security/editions/2023/en/0x11-t10/\" target=\"_blank\" rel=\"noopener\">OWASP — API security top 10 ↗</a></li><li><a class=\"ext-link\" href=\"https://grpc.io/docs/\" target=\"_blank\" rel=\"noopener\">gRPC docs ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 70 (P9)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m070.json or References tab."}, {"id": 70, "num": 71, "title": "Agent Cards & Agent Identity", "tools": "A2A agent cards, JSON", "priority": "MUST DO", "phase": "P9", "slug": "agent-cards---agent-identity", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 71 (P9)</strong> — Agent Cards &amp; Agent Identity. Tools focus: <em>A2A agent cards, JSON</em>. Core path — prioritize in your sprint.</p><p>Agent cards advertise skills, endpoints, and trust metadata — similar in spirit to OpenAPI for services. Accurate cards reduce unsafe trial-and-error discovery.</p></div></div>", "steps": "<ol><li>Draft a JSON agent card for a fake internal agent (no real URLs with secrets).</li><li>Validate the card against examples from the spec repo.</li><li>Peer review: can another teammate integrate without asking you?</li><li>Add authentication section: mTLS vs bearer — justify choice.</li><li>Version the card; document breaking change policy.</li></ol>", "code": "# Pseudocode: agent card JSON for discovery (follow latest A2A spec)\nAGENT_CARD = {\n  \"name\": \"research-agent\",\n  \"skills\": [{\"id\": \"web.search\", \"description\": \"Search and summarize\"}],\n  \"endpoints\": {\"tasks\": \"http://localhost:9100/tasks\"}\n}\nimport json; print(json.dumps(AGENT_CARD, indent=2))", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://github.com/google/A2A/blob/main/docs/topics/agent-discovery-and-identity.md\" target=\"_blank\" rel=\"noopener\">A2A — agent card ↗</a></li><li><a class=\"ext-link\" href=\"https://cloud.google.com/blog/products/ai-machine-learning/a2a-a-new-era-of-agent-interoperability\" target=\"_blank\" rel=\"noopener\">Google Cloud — A2A blog ↗</a></li><li><a class=\"ext-link\" href=\"https://datatracker.ietf.org/doc/html/rfc7519\" target=\"_blank\" rel=\"noopener\">IETF — JSON Web Token ↗</a></li><li><a class=\"ext-link\" href=\"https://owasp.org/API-Security/editions/2023/en/0x11-t10/\" target=\"_blank\" rel=\"noopener\">OWASP — API security top 10 ↗</a></li><li><a class=\"ext-link\" href=\"https://grpc.io/docs/\" target=\"_blank\" rel=\"noopener\">gRPC docs ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API\" target=\"_blank\" rel=\"noopener\">MDN — Fetch API ↗</a></li><li><a class=\"ext-link\" href=\"https:   }

const KEY = 'ai_master_tracker_v1';

let flatModuleCache = null;
function flatModules() {
  if (flatModuleCache) return flatModuleCache;
  flatModuleCache = [];
  PHASES.forEach((ph, pi) => {
    ph.modules.forEach((m, mi) => {
      flatModuleCache.push({ ...m, phaseIdx: pi, modIdx: mi, phaseName: ph.name, phaseCode: ph.code });
    });
  });
  return flatModuleCache;
}

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(KEY)) || defaultState();
  } catch {
    return defaultState();
  }
}
function defaultState() {
  return { modules: {}, certs: {}, portfolio: [], migrated: true };
}
function saveState(s) {
  localStorage.setItem(KEY, JSON.stringify(s));
}
let state = loadState();

function modKey(id) {
  return 'm' + id;
}
function isDone(id) {
  return !!state.modules[modKey(id)];
}
function setDone(id, v) {
  if (v) state.modules[modKey(id)] = true;
  else delete state.modules[modKey(id)];
  saveState(state);
}

function totalMods() {
  return flatModules().length;
}
function doneCount() {
  return flatModsDone();
}
function flatModsDone() {
  return flatModules().filter((m) => isDone(m.id)).length;
}
function phaseDoneCount(pi) {
  return PHASES[pi].modules.filter((m) => isDone(m.id)).length;
}
function phasePct(pi) {
  const t = PHASES[pi].modules.length;
  return t ? Math.round((phaseDoneCount(pi) / t) * 100) : 0;
}
function globalPct() {
  const t = totalMods();
  return t ? Math.round((doneCount() / t) * 100) : 0;
}

function p0GateOk() {
  return [0, 1, 2].every((id) => isDone(id));
}

function certPriceCounts() {
  const o = { free: 0, paid: 0, mixed: 0 };
  CERT_DEFS.forEach((c) => {
    if (Object.prototype.hasOwnProperty.call(o, c.price)) o[c.price] += 1;
  });
  return o;
}

function setCertPriceFilter(v) {
  certTrackerUi.price = v;
  renderCertTracker();
}

function certDefsFiltered() {
  const price = certTrackerUi.price;
  const q = (certTrackerUi.q || '').trim().toLowerCase();
  return CERT_DEFS.filter((c) => {
    if (price !== 'all' && c.price !== price) return false;
    if (!q) return true;
    const blob = `${c.provider} ${c.name} ${c.note || ''} ${c.studyPhases || ''}`.toLowerCase();
    return blob.includes(q);
  });
}

function escapeAttr(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;');
}

function onCertSearchInput(value) {
  certTrackerUi.q = value;
  clearTimeout(onCertSearchInput._t);
  onCertSearchInput._t = setTimeout(() => renderCertTracker(), 220);
}

function exportCoverageModuleCSV() {
  const hdr = [
    'phase_code',
    'module_num',
    'module_title',
    'priority',
    'content_tier',
    'self_contained_on_page',
    'blueprint_ref',
    'coverage_notes',
  ];
  const rows = [hdr];
  (COVERAGE.modules || []).forEach((m) => {
    rows.push([
      m.phase_code,
      m.module_num,
      m.module_title,
      m.priority,
      m.content_tier,
      m.self_contained_on_page,
      m.blueprint_ref || '',
      (m.coverage_notes || '').replace(/\r?\n/g, ' '),
    ]);
  });
  const esc = (c) => (/[",\n]/.test(String(c)) ? '"' + String(c).replace(/"/g, '""') + '"' : c);
  downloadText(
    'topics_coverage_export.csv',
    rows.map((r) => r.map(esc).join(',')).join('\n'),
    'text/csv',
  );
  showToast('CSV exported');
}

function renderCoverage() {

function buildSidebar() {
  const nav = document.getElementById('sb-nav');
  nav.innerHTML = '';
  nav.innerHTML += `<div class="nav-section">Navigation</div>`;
  NAV_PAGES.forEach((p) => {
    let badge = '';
    if (p.id === 'capstone') badge = `<span class="ni-badge">${CAPSTONES.length}</span>`;
    if (p.id === 'hackathons') badge = `<span class="ni-badge">${HACKATHONS.length}</span>`;
    if (p.id === 'opensource') badge = `<span class="ni-badge">${OPENSOURCE.length}</span>`;
    if (p.id === 'yc') badge = `<span class="ni-badge">${YC_IDEAS.length}</span>`;
    if (p.id === 'certs') badge = `<span class="ni-badge">${CERT_DEFS.length}</span>`;
    if (p.id === 'coverage') {
      const full = (COVERAGE.modules || []).filter((r) => r.self_contained_on_page === 'yes').length;
      badge = `<span class="ni-badge">${full}/${COVERAGE.modules?.length || 0}</span>`;
    }
    nav.innerHTML += `<div class="nav-item ${currentPage === p.id ? 'active' : ''}" onclick="showPage('${p.id}')" id="nav-${p.id}">
      <span class="ni-icon">${p.icon}</span>${p.label}${badge}
    </div>`;
  });
  nav.innerHTML += `<div class="nav-section">Phases (20)</div>`;
  PHASES.forEach((ph, pi) => {
    const pct = phasePct(pi);
    nav.innerHTML += `<div class="nav-item ${currentPage === 'phase-' + pi ? 'active' : ''}" onclick="showPage('phase-${pi}')" id="nav-phase-${pi}">
      <span class="ni-icon">${ph.icon}</span>${ph.code}: ${ph.name}
      <span class="ni-prog">${pct}%</span>
    </div>`;
  });
}

function updateSidebarProgress() {
  const pct = globalPct();
  document.getElementById('sb-pct').textContent = pct + '%';
  document.getElementById('sb-fill').style.width = pct + '%';
  PHASES.forEach((_, pi) => {

let sidebarCollapsed = false;
function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
  const ov = document.getElementById('overlay');
  if (window.innerWidth <= 768) ov.classList.toggle('show', !sidebarCollapsed);
}

function showPage(id) {
  currentPage = id;
  document.querySelectorAll('.page').forEach((p) => p.classList.remove('active'));
  document.getElementById('main').scrollTop = 0;
  buildSidebar();

  if (id === 'dashboard') {
    renderDashboard();
    document.getElementById('page-dashboard').classList.add('active');
    document.getElementById('topbar-title').textContent = 'Dashboard';
  } else if (id === 'coverage') {
    renderCoverage();
    document.getElementById('page-coverage').classList.add('active');
    document.getElementById('topbar-title').textContent = 'Topic coverage';
  } else if (id === 'modules') {
    renderAllPhases();
    document.getElementById('page-modules').classList.add('active');
    document.getElementById('topbar-title').textContent = 'All Phases';
  } else if (id.startsWith('phase-')) {
    const pi = parseInt(id.split('-')[1], 10);
    renderPhase(pi);
    document.getElementById('page-modules').classList.add('active');
    document.getElementById('topbar-title').textContent = PHASES[pi].name;
  } else if (id.startsWith('mod-')) {
    const mid = parseInt(id.split('-')[1], 10);
    renderModule(mid);
    document.getElementById('page-modules').classList.add('active');
    const m = flatModules().find((x) => x.id === mid);
    document.getElementById('topbar-title').textContent = m ? m.title : 'Module';
  } else if (id === 'capstone') {
    renderCapstone();
    document.getElementById('page-capstone').classList.add('active');
    document.getElementById('topbar-title').textContent = 'Capstones';
  } else if (id === 'hackathons') {
    renderHackathons();
    document.getElementById('page-hackathons').classList.add('active');
    document.getElementById('topbar-title').textContent = 'Hackathons';
  } else if (id === 'opensource') {
    renderOSS();
    document.getElementById('page-opensource').classList.add('active');
    document.getElementById('topbar-title').textContent = 'Open Source';
  } else if (id === 'yc') {
    renderYC();
    document.getElementById('page-yc').classList.add('active');
    document.getElementById('topbar-title').textContent = 'YC-Style Ideas';
  } else if (id === 'certs') {
    renderCertTracker();
    document.getElementById('page-certs').classList.add('active');
    document.getElementById('topbar-title').textContent = 'Certifications';
  } else if (id === 'career') {
    renderCareer();
    document.getElementById('page-career').classList.add('active');
    document.getElementById('topbar-title').textContent = 'Career';
  }

  if (window.innerWidth <= 768 && !sidebarCollapsed) toggleSidebar();
}

function certState(id) {
  return state.certs[id] || { status: 'not_started', exam: '' };
}

function certCounts() {
  let passed = 0;
  let inProgress = 0;
  CERT_DEFS.forEach((c) => {
    const st = certState(c.id).status;
    if (st === 'passed') passed++;
    else if (st === 'in_progress') inProgress++;
  });
  const total = CERT_DEFS.length;
  return { total, passed, inProgress, notStarted: total - passed - inProgress };
}

function setCertField(id, field, value) {
  if (!state.certs[id]) state.certs[id] = { status: 'not_started', exam: '' };
  state.certs[id][field] = value;
  saveState(state);
  if (currentPage === 'dashboard') renderDashboard();
}

function renderCertTracker() {
  const el = document.getElementById('page-certs');
  const pc = certPriceCounts();
  const list = certDefsFiltered();
  const f = certTrackerUi.price;

  const kindCls = (k) => (k === 'credential' ? 'cert-kind-credential' : 'cert-kind-learning');
  const kindLabel = (k) => (k === 'credential' ? 'Exam / cert' : 'Learning');
  el.innerHTML = `
<div class="dash-hero"><h1>Certifications & AI learning</h1><p>Vendor exams, free courses, and prep paths from major AI ecosystem players. Filter by cost; progress still saves locally in your JSON.</p></div>
<div class="cert-toolbar">
  <span class="cert-filter-label">Cost</span>
  <button type="button" class="cert-filter-btn${f === 'all' ? ' active' : ''}" onclick="setCertPriceFilter('all')">All (${CERT_DEFS.length})</button>
  <button type="button" class="cert-filter-btn${f === 'free' ? ' active' : ''}" onclick="setCertPriceFilter('free')">Free (${pc.free})</button>
  <button type="button" class="cert-filter-btn${f === 'mixed' ? ' active' : ''}" onclick="setCertPriceFilter('mixed')">Mixed (${pc.mixed})</button>
  <button type="button" class="cert-filter-btn${f === 'paid' ? ' active' : ''}" onclick="setCertPriceFilter('paid')">Paid (${pc.paid})</button>
  <span class="cert-toolbar-sep"></span>
  <label class="cert-search-wrap"><span class="cert-filter-label">Search</span>
    <input type="search" id="cert-search-q" class="cert-search-input" placeholder="Provider, topic…" autocomplete="off" value="${escapeAttr(certTrackerUi.q)}" oninput="onCertSearchInput(this.value)" />
  </label>
</div>
<p class="cert-filter-meta">Showing <strong>${list.length}</strong> of ${CERT_DEFS.length} · <span class="cert-price-tag ${priceCls('free')}">Free</span> training is $0; <span class="cert-price-tag ${priceCls('mixed')}">Mixed</span> = free prep with a paid exam or optional paid certificate; <span class="cert-price-tag ${priceCls('paid')}">Paid</span> = exam or paid program.</p>
<div class="cert-table">${
    list.length === 0
      ? '<p class="cert-empty">No entries match these filters. Try <strong>All</strong> or clear search.</p>'
      : list
          .map((c) => {
            const st = certState(c.id);
            return `
<div class="cert-track-row" data-cert-price="${c.price}">
  <div class="cert-track-main">
    <div class="cert-track-tags">
      <span class="cert-price-tag ${priceCls(c.price)}">${c.price === 'free' ? 'Free' : c.price === 'paid' ? 'Paid' : 'Mixed'}</span>
      <span class="cert-kind-tag ${kindCls(c.kind)}">${kindLabel(c.kind)}</span>
      <span class="cert-provider-tag">${escapeHtml(c.provider)}</span>
    </div>
    <div class="cert-track-name"><a href="${c.url}" target="_blank" rel="noopener" class="ext-link">${escapeHtml(c.name)} ↗</a></div>
    ${c.note ? `<div class="cert-track-note">${escapeHtml(c.note)}</div>` : ''}
    <div class="cert-track-study">Curriculum map: ${escapeHtml(c.studyPhases)}</div>
  </div>
  <div class="cert-track-controls">
    <select onchange="setCertField('${c.id}','status',this.value)">
      <option value="not_started" ${st.status === 'not_started' ? 'selected' : ''}>Not started</option>
      <option value="in_progress" ${st.status === 'in_progress' ? 'selected' : ''}>In progress</option>

    const p = phasePct(pi);

<div class="stats-grid" style="margin-bottom:20px">
  <div class="stat-card sc-purple"><div class="sc-label">Consultant readiness</div><div class="sc-val">${pct}%</div><div class="sc-sub">based on ${doneCount()}/${totalMods()} modules</div></div>

function linkedinComposer() {
  const done = doneCount();
  const highlights = PHASES.filter((_, pi) => phaseDoneCount(pi) > 0)
    .map((ph) => ph.code)
    .slice(0, 6)
    .join(', ');
  return `Update: completed ${done} modules on my AI Master Tracker (20-phase agentic AI path).\nPhases in motion: ${highlights || 'starting P0'}.\n\n#AI #AgenticAI #MCP #Consulting`;
}

function copyComposer() {
  const t = document.getElementById('li-composer');
  if (!t) return;
  navigator.clipboard.writeText(t.value).then(() => showToast('Copied'));
}

function savePortfolio(text) {
  state.portfolio = text
    .split('\n')
    .map((s) => s.trim())
    .filter(Boolean);
  saveState(state);
}

function toggleThemeDD() {
  document.getElementById('themeDD').classList.toggle('open');
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('.theme-wrap')) document.getElementById('themeDD').classList.remove('open');
});
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('ai_theme', t);
  syncThemeOpts();
  showToast('Theme: ' + t);
}
function syncThemeOpts() {
  const t = document.documentElement.getAttribute('data-theme') || 'dark';
  document.querySelectorAll('.theme-opt').forEach((o) => {
    o.classList.toggle('active', o.dataset.theme === t);
  });
}
const savedTheme = localStorage.getItem('ai_theme');
if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

function exportCSV() {
  const rows = [['ModuleNum', 'Done']];
  flatModules().forEach((m) => {
    rows.push([m.num, isDone(m.id) ? 'Yes' : 'No']);
  });
  downloadText('ai_master_progress.csv', rows.map((r) => r.join(',')).join('\n'), 'text/csv');
  showToast('CSV exported');
}

function importCSV(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = (ev) => {
    let n = 0;
    ev.target.result.split('\n').slice(1).forEach((line) => {
      const p = line.trim().split(',');
      if (p.length >= 2 && p[1].trim().toLowerCase() === 'yes') {
        const num = parseInt(p[0], 10);
        const mod = flatModules().find((m) => m.num === num);
        if (mod) {
          state.modules[modKey(mod.id)] = true;
          n++;
        }
      }
    });
    saveState(state);
    showToast('Imported ' + n + ' modules');
    refreshView();
  };
  r.readAsText(f);
  e.target.value = '';
}

function exportJSON() {
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    modules: state.modules,
    certs: state.certs,
    portfolio: state.portfolio,
  };
  downloadText('ai_master_tracker_state.json', JSON.stringify(payload, null, 2), 'application/json');
  showToast('JSON exported (flat file backup)');
}

function importJSON(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.modules) state.modules = data.modules;
      if (data.certs) state.certs = data.certs;
      if (data.portfolio) state.portfolio = data.portfolio;
      saveState(state);
      showToast('JSON imported');
      refreshView();
    } catch {
      showToast('Invalid JSON');
    }
  };
  r.readAsText(f);
  e.target.value = '';
}

function downloadText(name, text, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: mime }));
  a.download = name;
  a.click();
}

function refreshView() {
  updateSidebarProgress();
  if (currentPage === 'dashboard') renderDashboard();
  else if (currentPage === 'modules') renderAllPhases();
  else if (currentPage.startsWith('phase-')) renderPhase(parseInt(currentPage.split('-')[1], 10));
  else if (currentPage.startsWith('mod-')) renderModule(parseInt(currentPage.split('-')[1], 10));
  else if (currentPage === 'career') renderCareer();
  else if (currentPage === 'certs') renderCertTracker();
  else if (currentPage === 'coverage') renderCoverage();
}

function confirmReset() {
  if (confirm('Reset all local progress, certs, and portfolio notes? Export JSON first if needed.')) {
    state = defaultState();
    saveState(state);
    updateSidebarProgress();
    refreshView();
    showToast('Reset complete');
  }
}

function copyCode(btn) {
  const pre = btn.parentElement.querySelector('pre');
  navigator.clipboard.writeText(pre.innerText).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => (btn.textContent = 'Copy'), 2000);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function confetti() {
  const colors = ['#c084fc', '#4ade80', '#fb923c', '#60a5fa', '#fbbf24'];
  for (let i = 0; i < 6; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-p';
    c.style.cssText = `left:${Math.random() * 100}vw;top:60vh;background:${colors[Math.floor(Math.random() * colors.length)]}`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 1200);
  }
}

buildSidebar();
updateSidebarProgress();
renderDashboard();
syncThemeOpts();

</script>
