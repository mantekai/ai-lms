<!DOCTYPE html>
<!-- AI Master Tracker: 133-module curriculum shell, tabs, JSON/CSV sync. Manish.AI -->
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Master Tracker — Learning OS</title>
<style>
/* ═══════════ THEMES ═══════════ */
[data-theme="dark"]{--bg:#0f0f13;--surf:#18181f;--surf2:#22222c;--surf3:#2a2a38;--brd:#2e2e3e;--text:#f1f0f7;--muted:#9898b0;--muted2:#55556a;--acc:#c084fc;--acc2:#a855f7;--acc3:#7c3aed;--green:#4ade80;--orange:#fb923c;--blue:#60a5fa;--yellow:#fbbf24;--red:#f87171;--local:#34d399;--localBg:#0a1f15;--gold:#fbbf24;--sidebar-w:252px}
[data-theme="light"]{--bg:#f8f9fb;--surf:#ffffff;--surf2:#f1f3f7;--surf3:#e8eaf0;--brd:#dde1ea;--text:#1a1a2e;--muted:#6b7280;--muted2:#9ca3af;--acc:#7c3aed;--acc2:#a855f7;--acc3:#c084fc;--green:#16a34a;--orange:#ea580c;--blue:#2563eb;--yellow:#d97706;--red:#dc2626;--local:#059669;--localBg:#f0fdf4;--gold:#b45309;--sidebar-w:252px}
[data-theme="ocean"]{--bg:#0a1628;--surf:#0f1e35;--surf2:#162640;--surf3:#1d3050;--brd:#1e3a54;--text:#e0eaf8;--muted:#7a9abf;--muted2:#4a6a8f;--acc:#38bdf8;--acc2:#0ea5e9;--acc3:#0284c7;--green:#4ade80;--orange:#fb923c;--blue:#93c5fd;--yellow:#fde68a;--red:#fca5a5;--local:#34d399;--localBg:#042f2e;--gold:#fde68a;--sidebar-w:252px}
[data-theme="mint"]{--bg:#f0fdf8;--surf:#ffffff;--surf2:#ecfdf5;--surf3:#d1fae5;--brd:#a7f3d0;--text:#064e3b;--muted:#4a7c6b;--muted2:#6b9b8a;--acc:#059669;--acc2:#10b981;--acc3:#34d399;--green:#16a34a;--orange:#ea580c;--blue:#0284c7;--yellow:#d97706;--red:#dc2626;--local:#059669;--localBg:#f0fdf4;--gold:#92400e;--sidebar-w:252px}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px;transition:background .2s,color .2s}

/* ═══════════ SIDEBAR ═══════════ */
#sidebar{
  width:var(--sidebar-w);background:var(--surf);border-right:1px solid var(--brd);
  display:flex;flex-direction:column;height:100vh;overflow-y:auto;flex-shrink:0;
  transition:width .25s,transform .25s;position:relative;z-index:50;
}
#sidebar.collapsed{width:0;overflow:hidden;border-right:none}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:4px}

.sb-logo{padding:16px 14px 12px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer;border-radius:0;transition:background .15s}
.sb-logo:hover{background:var(--surf2)}
.sb-logo:focus{outline:2px solid var(--acc);outline-offset:-2px}
.sb-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--acc3),var(--acc));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sb-logo-text{font-size:14px;font-weight:700;white-space:nowrap}
.sb-logo-sub{font-size:10px;color:var(--muted);margin-top:1px}

.sb-prog{padding:10px 14px;border-bottom:1px solid var(--brd)}
.sb-prog-label{font-size:10px;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between}
.sb-prog-label span{color:var(--acc);font-weight:600}
.prog-bar{height:4px;background:var(--surf3);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc3),var(--acc));border-radius:99px;transition:width .4s}

.nav-section{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);padding:12px 14px 5px;text-transform:uppercase;white-space:nowrap}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:12.5px;color:var(--muted);transition:all .15s;border-left:2px solid transparent;white-space:nowrap}
.nav-item:hover{background:var(--surf2);color:var(--text)}
.nav-item.active{background:var(--surf2);color:var(--acc);border-left-color:var(--acc)}
.nav-item .ni-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-item .ni-prog{margin-left:auto;font-size:10px;color:var(--muted)}
.nav-item.active .ni-prog{color:var(--acc)}
.nav-item .ni-badge{margin-left:auto;font-size:9px;padding:1px 6px;border-radius:99px;background:var(--surf3);color:var(--muted)}
.nav-item.active .ni-badge{background:var(--acc3);color:#fff}

.sb-footer{margin-top:auto;padding:10px 14px;border-top:1px solid var(--brd);font-size:10px;color:var(--muted);flex-shrink:0}
.sb-actions{display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.sb-btn{font-size:9px;padding:4px 8px;border-radius:5px;border:1px solid var(--brd);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap}
.sb-btn:hover{border-color:var(--acc);color:var(--acc)}
.sb-btn.danger:hover{border-color:var(--red);color:var(--red)}

/* ═══════════ TOPBAR ═══════════ */
#topbar{
  position:sticky;top:0;z-index:40;background:var(--surf);border-bottom:1px solid var(--brd);
  height:46px;display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;
}
.toggle-btn{width:28px;height:28px;border:1px solid var(--brd);background:transparent;border-radius:6px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.toggle-btn:hover{border-color:var(--acc);color:var(--acc)}
.topbar-title{font-size:13px;font-weight:600;color:var(--text)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}

/* Theme dropdown */
.theme-wrap{position:relative}
.theme-trigger{display:flex;align-items:center;gap:5px;font-size:11px;padding:5px 10px;border:1px solid var(--brd);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap}
.theme-trigger:hover{border-color:var(--acc);color:var(--acc)}
.theme-dropdown{
  position:absolute;right:0;top:calc(100% + 4px);background:var(--surf);border:1px solid var(--brd);
  border-radius:8px;overflow:hidden;z-index:200;min-width:120px;display:none;box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.theme-dropdown.open{display:block}
.theme-opt{padding:8px 12px;font-size:12px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:7px}
.theme-opt:hover{background:var(--surf2);color:var(--text)}
.theme-opt.active{color:var(--acc)}

/* CSV / export row */
.topbar-action{font-size:10px;padding:4px 9px;border:1px solid var(--brd);border-radius:5px;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap}
.topbar-action:hover{border-color:var(--acc);color:var(--acc)}

/* ═══════════ MAIN ═══════════ */
#shell{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#main{flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg)}
#main::-webkit-scrollbar{width:6px}
#main::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:4px}

.page{display:none}
.page.active{display:block}

/* ═══════════ DASHBOARD ═══════════ */
.dash-hero{margin-bottom:22px}
.dash-hero h1{font-size:22px;font-weight:700}
.dash-hero p{color:var(--muted);font-size:13px;margin-top:3px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:14px 16px}
.sc-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.sc-val{font-size:26px;font-weight:700}
.sc-sub{font-size:10px;color:var(--muted);margin-top:2px}
.sc-purple .sc-val{color:var(--acc)}
.sc-green .sc-val{color:var(--green)}
.sc-orange .sc-val{color:var(--orange)}
.sc-blue .sc-val{color:var(--blue)}
.sc-gold .sc-val{color:var(--gold)}
.stats-grid-5{grid-template-columns:repeat(5,1fr)}
@media(max-width:1100px){.stats-grid-5{grid-template-columns:repeat(3,1fr)}}

.section-hd{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-hd .cnt{font-size:10px;font-weight:500;color:var(--muted);background:var(--surf2);padding:2px 8px;border-radius:99px}

.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:28px}
.mod-card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.mod-card:hover{border-color:var(--acc3);transform:translateY(-2px);box-shadow:0 6px 24px rgba(124,58,237,.15)}
.mod-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.mc-0::before{background:linear-gradient(90deg,#60a5fa,#a78bfa)}
.mc-1::before{background:linear-gradient(90deg,#c084fc,#f472b6)}
.mc-2::before{background:linear-gradient(90deg,#fb923c,#f59e0b)}
.mc-3::before{background:linear-gradient(90deg,#4ade80,#22d3ee)}
.mc-4::before{background:linear-gradient(90deg,#f87171,#fb923c)}
.mc-5::before{background:linear-gradient(90deg,#34d399,#10b981)}
.mc-6::before{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
.mc-7::before{background:linear-gradient(90deg,#818cf8,#6366f1)}
.mc-8::before{background:linear-gradient(90deg,#e879f9,#c026d3)}
.mc-9::before{background:linear-gradient(90deg,#2dd4bf,#0d9488)}
.mc-10::before{background:linear-gradient(90deg,#f87171,#dc2626)}
.mc-11::before{background:linear-gradient(90deg,#a78bfa,#7c3aed)}
.mod-card-hd{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.mod-icon{font-size:24px;flex-shrink:0}
.mod-title{font-size:14px;font-weight:700}
.mod-desc{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.45}
.mod-stats{display:flex;gap:12px;font-size:11px;color:var(--muted);margin-bottom:8px}
.mod-prog{height:3px;background:var(--surf3);border-radius:99px;overflow:hidden;margin-bottom:10px}
.mod-prog-fill{height:100%;border-radius:99px;transition:width .4s}
.mod-footer{display:flex;justify-content:space-between;align-items:center}
.mod-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;border:1px solid var(--brd);background:var(--surf2);color:var(--text);cursor:pointer}
.mod-btn:hover{background:var(--acc3);border-color:var(--acc3);color:#fff}
.mod-pct{font-size:12px;font-weight:700;color:var(--acc)}

/* ═══════════ MODULE PAGE ═══════════ */
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer;padding:5px 10px;border-radius:7px;border:1px solid var(--brd);background:var(--surf);margin-bottom:16px}
.back-btn:hover{color:var(--text);border-color:var(--acc3)}

.course-hd{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.course-hd-icon{font-size:36px;flex-shrink:0;margin-top:3px}
.course-hd-text h2{font-size:20px;font-weight:700}
.course-hd-text p{color:var(--muted);font-size:12.5px;margin-top:3px}
.course-hd-text .tags-row{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.ctag{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--surf2);border:1px solid var(--brd);color:var(--muted)}
.ctag.beginner{border-color:var(--green);color:var(--green)}
.ctag.intermediate{border-color:var(--yellow);color:var(--yellow)}
.ctag.advanced{border-color:var(--red);color:var(--red)}

.course-prog-banner{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:18px}
.cpb-pct{font-size:20px;font-weight:700;color:var(--acc);flex-shrink:0}
.cpb-lbl{font-size:11px;color:var(--muted)}
.cpb-bar{flex:1;height:7px;background:var(--surf3);border-radius:99px;overflow:hidden}
.cpb-fill{height:100%;background:linear-gradient(90deg,var(--acc3),var(--acc));border-radius:99px;transition:width .4s}
.cpb-done{font-size:12px;color:var(--green);font-weight:600;flex-shrink:0}

.lessons-list{display:flex;flex-direction:column;gap:0}
.group-label{font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--muted);text-transform:uppercase;padding:14px 0 6px;display:flex;align-items:center;gap:8px}
.group-label::after{content:'';flex:1;height:1px;background:var(--brd)}

/* LESSON ITEM — expandable */
.lesson-item{background:var(--surf);border:1px solid var(--brd);border-radius:10px;margin-bottom:6px;overflow:hidden;transition:border-color .15s}
.lesson-item:hover{border-color:var(--acc3)}
.lesson-item.done{border-color:#166534;background:var(--localBg)}
[data-theme="light"] .lesson-item.done{background:#f0fdf4;border-color:#86efac}
[data-theme="ocean"] .lesson-item.done{background:#042f2e;border-color:#065f46}

.lesson-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer}
.lesson-num{font-size:10px;color:var(--muted);background:var(--surf2);border:1px solid var(--brd);width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.lesson-item.done .lesson-num{color:var(--green);border-color:#166534}
.lesson-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--brd);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:12px;transition:all .2s;background:var(--surf2)}
.lesson-check:hover{border-color:var(--acc)}
.lesson-item.done .lesson-check{background:var(--green);border-color:var(--green);color:#052e16}
.lesson-title{font-size:13px;font-weight:600;flex:1}
.lesson-item.done .lesson-title{color:var(--muted);text-decoration:line-through}
.lesson-badges{display:flex;gap:5px;margin-left:auto;flex-shrink:0}
.lbadge{font-size:9.5px;padding:2px 7px;border-radius:99px;background:var(--surf2);border:1px solid var(--brd);color:var(--muted)}
.lbadge.concept{color:var(--blue);border-color:#1e3a5f}
.lbadge.hands-on{color:var(--orange);border-color:#4a2510}
.lbadge.reference{color:var(--acc);border-color:#3b1f66}
.lbadge.exercise{color:var(--green);border-color:#145230}
.lbadge.cert{color:var(--gold);border-color:#4a3a00}
.lbadge.free{color:var(--local);border-color:#145230}

.lesson-expand-icon{font-size:10px;color:var(--muted);margin-left:6px;transition:transform .2s;flex-shrink:0}
.lesson-item.expanded .lesson-expand-icon{transform:rotate(90deg)}

/* LESSON BODY — full content inline */
.lesson-body{display:none;padding:0 16px 16px}
.lesson-item.expanded .lesson-body{display:block}
.lesson-body-inner{border-top:1px solid var(--brd);padding-top:14px}

.content-block{margin-bottom:14px}
.cb-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.cb-text{font-size:12.5px;line-height:1.7;color:var(--text)}
.cb-text p{margin-bottom:8px}
.cb-text ul,.cb-text ol{padding-left:18px;margin-bottom:8px}
.cb-text li{margin-bottom:4px;font-size:12px;line-height:1.6}
.cb-text strong{color:var(--text);font-weight:600}
.cb-text code{background:var(--surf3);padding:1px 5px;border-radius:3px;font-family:'SF Mono',monospace;font-size:11px;color:var(--acc)}

/* Code block */
.code-block{background:var(--surf3);border:1px solid var(--brd);border-radius:8px;overflow-x:auto;margin:10px 0;position:relative}
.code-block pre{padding:12px 14px;font-family:'SF Mono','Monaco','Fira Code',monospace;font-size:11.5px;line-height:1.7;color:var(--text)}
.code-block pre .kw{color:#c084fc}
.code-block pre .str{color:#4ade80}
.code-block pre .cmt{color:var(--muted)}
.code-block pre .num{color:#fb923c}
.code-block pre .fn{color:#60a5fa}
.copy-code{position:absolute;top:7px;right:8px;font-size:9px;padding:3px 8px;border:1px solid var(--brd);border-radius:4px;background:var(--surf2);color:var(--muted);cursor:pointer}
.copy-code:hover{border-color:var(--acc);color:var(--acc)}
.copy-code.copied{color:var(--green);border-color:var(--green)}

/* Certs */
.cert-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.cert-item{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;border:1px solid;font-size:11px;text-decoration:none;transition:all .15s}
.cert-item:hover{transform:translateY(-1px)}
.cert-free{color:var(--local);border-color:var(--local);background:var(--localBg)}
.cert-paid{color:var(--gold);border-color:var(--gold);background:#1a1200}
[data-theme="light"] .cert-paid{background:#fffbeb}
[data-theme="light"] .cert-free{background:#f0fdf4}
.cert-item span{font-weight:600}

/* External link */
.ext-link{display:inline-flex;align-items:center;gap:4px;color:var(--blue);font-size:11px;text-decoration:none;border-bottom:1px solid transparent}
.ext-link:hover{border-bottom-color:var(--blue)}

/* ═══════════ SPECIAL PAGES ═══════════ */
/* Capstone cards */
.cap-grid{display:flex;flex-direction:column;gap:20px}
.cap-card{background:var(--surf);border:1px solid var(--brd);border-radius:14px;overflow:hidden}
.cap-card-hd{padding:18px 20px;display:flex;align-items:flex-start;gap:14px;border-bottom:1px solid var(--brd);cursor:pointer}
.cap-card-hd:hover{background:var(--surf2)}
.cap-num{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;border:1px solid var(--acc);color:var(--acc);flex-shrink:0;margin-top:2px}
.cap-title{font-size:15px;font-weight:700}
.cap-subtitle{font-size:12px;color:var(--muted);margin-top:2px}
.cap-stack{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.cap-tag{font-size:9.5px;padding:2px 7px;border-radius:99px;background:var(--surf3);color:var(--muted);border:1px solid var(--brd)}
.cap-expand{margin-left:auto;font-size:18px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.cap-card.open .cap-expand{transform:rotate(45deg)}
.cap-body{display:none;padding:20px}
.cap-card.open .cap-body{display:block}
.cap-section{margin-bottom:18px}
.cap-section h4{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc);margin-bottom:8px}
.cap-section .cb-text{font-size:12.5px;line-height:1.7}
.arch-steps{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:8px}
.arch-step{background:var(--surf2);border:1px solid var(--brd);border-radius:8px;padding:12px 14px}
.as-num{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc);margin-bottom:4px}
.as-title{font-size:12px;font-weight:600;margin-bottom:3px}
.as-desc{font-size:11px;color:var(--muted);line-height:1.5}

/* Hackathon/OSS cards */
.hack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.hack-card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:16px;transition:all .2s}
.hack-card:hover{border-color:var(--acc3);transform:translateY(-1px)}
.hack-card-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hack-icon{font-size:22px}
.hack-title{font-size:13px;font-weight:700}
.hack-org{font-size:11px;color:var(--muted);margin-top:1px}
.hack-desc{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:10px}
.hack-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.hmeta{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--surf2);border:1px solid var(--brd);color:var(--muted)}
.hmeta.live{color:var(--green);border-color:var(--green)}
.hmeta.prize{color:var(--gold);border-color:var(--gold)}
.hack-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:6px 12px;border-radius:7px;border:1px solid var(--brd);background:var(--surf2);color:var(--text);text-decoration:none;transition:all .15s}
.hack-link:hover{background:var(--acc3);border-color:var(--acc3);color:#fff}

/* ═══════════ LINKEDIN BOX ═══════════ */
