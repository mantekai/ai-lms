<script type="application/json" id="CURRICULUM_JSON">{"version": 1, "phases": [{"code": "P0", "name": "Local AI Setup", "purpose": "Full local AI environment before writing agent code", "icon": "💻", "color": "mc-0", "modules": [{"id": 0, "num": 1, "title": "Ollama Setup & Local Model Running", "tools": "Ollama, llama3, mistral", "priority": "MUST DO", "phase": "P0", "slug": "ollama-setup---local-model-running", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 1 (P0)</strong> — Ollama Setup &amp; Local Model Running. Tools focus: <em>Ollama, llama3, mistral</em>. Core path — prioritize in your sprint.</p><p>Ollama runs open-weight models locally with a simple CLI and HTTP API. Models ship as downloadable blobs; you pull once and run offline-capable inference on CPU or GPU depending on size.</p><p>Practice the full loop: install, pull a 7–8B-class model, run interactive chat, then call the HTTP API from a script. Note RAM/VRAM limits — if generation is slow, that is expected on CPU-only machines.</p><ul><li>Distinguish <em>pull</em> vs <em>run</em> vs serving multiple models.</li><li>Know how to list installed models and free disk space.</li></ul></div></div>", "steps": "<ol><li>Install Ollama from the official site for your OS; confirm `ollama --version`.</li><li>Run `ollama pull` for a small chat model (e.g. llama3.2 or mistral) and wait for completion.</li><li>Use `ollama run &lt;model&gt;` with three prompts: factual, reasoning, and code generation.</li><li>From another terminal, hit the local HTTP API with curl or httpx using the same model.</li><li>Document hardware (RAM/GPU), model size, and tokens/sec in NOTES.md for your portfolio.</li></ol>", "code": "curl -fsSL https://ollama.com/install.sh | sh\nollama pull llama3.2\nollama run llama3.2 \"Summarize MCP in 3 bullets\"", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://ollama.com/\" target=\"_blank\" rel=\"noopener\">Ollama — home ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/ollama/ollama\" target=\"_blank\" rel=\"noopener\">Ollama GitHub ↗</a></li><li><a class=\"ext-link\" href=\"https://ollama.com/library\" target=\"_blank\" rel=\"noopener\">Model library ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.docker.com/get-started/\" target=\"_blank\" rel=\"noopener\">Docker — get started ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.python.org/3/library/venv.html\" target=\"_blank\" rel=\"noopener\">Python — venv ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.nvidia.com/cuda-downloads\" target=\"_blank\" rel=\"noopener\">NVIDIA — CUDA downloads ↗</a></li><li><a class=\"ext-link\" href=\"https://brew.sh/\" target=\"_blank\" rel=\"noopener\">Homebrew (macOS) ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 1 (P0)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m001.json or References tab."}, {"id": 1, "num": 2, "title": "LM Studio — GUI for Local LLMs", "tools": "LM Studio, GGUF models", "priority": "MUST DO", "phase": "P0", "slug": "lm-studio---gui-for-local-llms", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 2 (P0)</strong> — LM Studio — GUI for Local LLMs. Tools focus: <em>LM Studio, GGUF models</em>. Core path — prioritize in your sprint.</p><p>LM Studio provides a desktop UI for discovering GGUF checkpoints, loading them with configurable context and GPU layers, and exposing an OpenAI-compatible local server (often on port 1234).</p><p>Learn when GUI workflows beat CLI-only runners: comparing quantizations (Q4_K_M vs Q8), toggling GPU offload, and debugging tokenizer mismatches when copying prompts from hosted APIs.</p></div></div>", "steps": "<ol><li>Install LM Studio; download one GGUF model appropriate for your machine.</li><li>Start a local server; verify `GET /v1/models` returns your loaded model.</li><li>From Python or curl, send a chat completion to the local OpenAI-compatible endpoint.</li><li>Experiment with GPU layer count: note speed vs quality trade-offs in a short table.</li><li>Export your server settings screenshot + one sample request/response (redact any sensitive text).</li></ol>", "code": "# After starting LM Studio local server (default :1234):\ncurl http://localhost:1234/v1/models", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://lmstudio.ai/\" target=\"_blank\" rel=\"noopener\">LM Studio ↗</a></li><li><a class=\"ext-link\" href=\"https://lmstudio.ai/docs\" target=\"_blank\" rel=\"noopener\">LM Studio docs ↗</a></li><li><a class=\"ext-link\" href=\"https://huggingface.co/docs/hub/en/gguf\" target=\"_blank\" rel=\"noopener\">GGUF / Hugging Face Hub ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.docker.com/get-started/\" target=\"_blank\" rel=\"noopener\">Docker — get started ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.python.org/3/library/venv.html\" target=\"_blank\" rel=\"noopener\">Python — venv ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.nvidia.com/cuda-downloads\" target=\"_blank\" rel=\"noopener\">NVIDIA — CUDA downloads ↗</a></li><li><a class=\"ext-link\" href=\"https://brew.sh/\" target=\"_blank\" rel=\"noopener\">Homebrew (macOS) ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 2 (P0)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m002.json or References tab."}, {"id": 2, "num": 3, "title": "Open WebUI — Local ChatGPT Interface", "tools": "Open WebUI, Docker", "priority": "MUST DO", "phase": "P0", "slug": "open-webui---local-chatgpt-interface", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 3 (P0)</strong> — Open WebUI — Local ChatGPT Interface. Tools focus: <em>Open WebUI, Docker</em>. Core path — prioritize in your sprint.</p><p>Open WebUI is a browser front-end for many backends (Ollama, OpenAI-compatible proxies). Docker is the common install path; you get multi-user patterns, model switching, and optional RAG plugins depending on build.</p><p>Focus on operational concerns: volume mounts for persistence, upgrading images, and separating internal vs external network exposure if you demo on a laptop hotspot.</p></div></div>", "steps": "<ol><li>Run Open WebUI via the documented Docker command; confirm the UI loads on localhost.</li><li>Connect the UI to your local Ollama or LM Studio backend; send test chats through both.</li><li>Create two model presets (e.g. fast vs quality) and document when you would use each.</li><li>Back up or note the Docker volume path so you can recreate the environment.</li><li>List one limitation you hit (auth, plugins, model list) and how you would address it in production.</li></ol>", "code": "# Module 3 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 3, \"topic\": \"Open WebUI — Local ChatGPT Interface\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://github.com/open-webui/open-webui\" target=\"_blank\" rel=\"noopener\">Open WebUI ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.openwebui.com/\" target=\"_blank\" rel=\"noopener\">Open WebUI docs ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.docker.com/get-started/\" target=\"_blank\" rel=\"noopener\">Docker — get started ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.python.org/3/library/venv.html\" target=\"_blank\" rel=\"noopener\">Python — venv ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.nvidia.com/cuda-downloads\" target=\"_blank\" rel=\"noopener\">NVIDIA — CUDA downloads ↗</a></li><li><a class=\"ext-link\" href=\"https://brew.sh/\" target=\"_blank\" rel=\"noopener\">Homebrew (macOS) ↗</a></li><li><a class=\"ext-link\" href=\"https://hub.docker.com/\" target=\"_blank\" rel=\"noopener\">Docker Hub ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 3 (P0)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m003.json or References tab."}, {"id": 3, "num": 4, "title": "vLLM — High-Performance Inference", "tools": "vLLM, CUDA, Python", "priority": "OPTIONAL", "phase": "P0", "slug": "vllm---high-performance-inference", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 4 (P0)</strong> — vLLM — High-Performance Inference. Tools focus: <em>vLLM, CUDA, Python</em>. Optional depth — revisit when you need this specialty.</p><p>vLLM targets high-throughput GPU serving with PagedAttention and continuous batching. It is the layer beneath many internal model-serving stacks when latency under load matters more than a desktop GUI.</p><p>Understand CUDA/driver expectations, batching knobs, and when vLLM is overkill vs Ollama for solo development.</p></div></div>", "steps": "<ol><li>Read the official installation prerequisites (CUDA version, GPU memory).</li><li>Launch a minimal OpenAI-compatible server with a documented quickstart model.</li><li>Send concurrent requests (simple script) and observe throughput vs single-threaded local runners.</li><li>Capture one error from misconfigured CUDA or OOM and document the fix path.</li><li>Write two sentences: when you would choose vLLM vs a simpler local runner for a client project.</li></ol>", "code": "# Module 4 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 4, \"topic\": \"vLLM — High-Performance Inference\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://docs.vllm.ai/\" target=\"_blank\" rel=\"noopener\">vLLM documentation ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/vllm-project/vllm\" target=\"_blank\" rel=\"noopener\">vLLM GitHub ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.docker.com/get-started/\" target=\"_blank\" rel=\"noopener\">Docker — get started ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.python.org/3/library/venv.html\" target=\"_blank\" rel=\"noopener\">Python — venv ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.nvidia.com/cuda-downloads\" target=\"_blank\" rel=\"noopener\">NVIDIA — CUDA downloads ↗</a></li><li><a class=\"ext-link\" href=\"https://brew.sh/\" target=\"_blank\" rel=\"noopener\">Homebrew (macOS) ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.ray.io/en/latest/index.html\" target=\"_blank\" rel=\"noopener\">Ray — documentation ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 4 (P0)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m004.json or References tab."}, {"id": 4, "num": 5, "title": "LiteLLM Routing & Load Balancing", "tools": "LiteLLM, proxy server", "priority": "MUST DO", "phase": "P0", "slug": "litellm-routing---load-balancing", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 5 (P0)</strong> — LiteLLM Routing &amp; Load Balancing. Tools focus: <em>LiteLLM, proxy server</em>. Core path — prioritize in your sprint.</p><p>LiteLLM is a unified router: one interface to many providers and local endpoints, with optional proxy features for budgets, fallbacks, and load balancing. It fits teams that standardize on OpenAI-style request bodies.</p><p>Practice routing the same prompt to a local model and a hosted model; compare responses and failure modes when a backend is down.</p></div></div>", "steps": "<ol><li>Install LiteLLM; configure at least two backends (e.g. Ollama + one hosted key).</li><li>Send a completion through LiteLLM using the unified model string format.</li><li>Simulate a failing backend; configure a fallback model and verify the request succeeds.</li><li>Enable or inspect spend logging (if using proxy mode) with synthetic requests only.</li><li>Document your routing table and when each backend is chosen.</li></ol>", "code": "pip install litellm\npython -c \"import litellm; print(litellm.completion(model='ollama/llama3.2', messages=[{'role':'user','content':'ping'}]))\"", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://docs.litellm.ai/docs/\" target=\"_blank\" rel=\"noopener\">LiteLLM docs ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/BerriAI/litellm\" target=\"_blank\" rel=\"noopener\">LiteLLM GitHub ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.docker.com/get-started/\" target=\"_blank\" rel=\"noopener\">Docker — get started ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.python.org/3/library/venv.html\" target=\"_blank\" rel=\"noopener\">Python — venv ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.nvidia.com/cuda-downloads\" target=\"_blank\" rel=\"noopener\">NVIDIA — CUDA downloads ↗</a></li><li><a class=\"ext-link\" href=\"https://brew.sh/\" target=\"_blank\" rel=\"noopener\">Homebrew (macOS) ↗</a></li><li><a class=\"ext-link\" href=\"https://platform.openai.com/docs/api-reference\" target=\"_blank\" rel=\"noopener\">OpenAI API compatibility ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 5 (P0)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m005.json or References tab."}, {"id": 5, "num": 6, "title": "Free APIs: Groq, Gemini, Mistral, OpenRouter", "tools": "Groq API, Gemini, OpenRouter", "priority": "MUST DO", "phase": "P0", "slug": "free-apis--groq--gemini--mistral--openrouter", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 6 (P0)</strong> — Free APIs: Groq, Gemini, Mistral, OpenRouter. Tools focus: <em>Groq API, Gemini, OpenRouter</em>. Core path — prioritize in your sprint.</p><p>Free or low-cost hosted APIs (Groq LPU-style inference, Gemini developer tier, Mistral keys, OpenRouter aggregation) let you prototype without training models. Each has different rate limits, safety filters, and JSON/tooling support.</p><p>Build a comparison matrix: latency, max context, function-calling support, and pricing unit. Never ship production traffic on keys committed to git.</p></div></div>", "steps": "<ol><li>Create sandbox keys for at least two listed providers; store them only in env vars.</li><li>Run the same three prompts through each; log latency and rough quality notes.</li><li>Check each vendor's rate-limit headers or dashboard; note burst vs sustained limits.</li><li>Identify which provider supports tool calling for your SDK version — try one tool call if available.</li><li>Summarize in one page which provider you would default to for prototyping vs demos.</li></ol>", "code": "import os\n# Use env vars — never commit keys\nfrom openai import OpenAI\nclient = OpenAI(api_key=os.environ.get(\"OPENAI_API_KEY\"))\nr = client.chat.completions.create(\n    model=\"gpt-4o-mini\",\n    messages=[{\"role\": \"user\", \"content\": \"Hello from module 6!\"}],\n)\nprint(r.choices[0].message.content)", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://console.groq.com/docs/overview\" target=\"_blank\" rel=\"noopener\">Groq API docs ↗</a></li><li><a class=\"ext-link\" href=\"https://ai.google.dev/gemini-api/docs\" target=\"_blank\" rel=\"noopener\">Google AI Studio / Gemini ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.mistral.ai/\" target=\"_blank\" rel=\"noopener\">Mistral API ↗</a></li><li><a class=\"ext-link\" href=\"https://openrouter.ai/docs\" target=\"_blank\" rel=\"noopener\">OpenRouter API ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.docker.com/get-started/\" target=\"_blank\" rel=\"noopener\">Docker — get started ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.python.org/3/library/venv.html\" target=\"_blank\" rel=\"noopener\">Python — venv ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.nvidia.com/cuda-downloads\" target=\"_blank\" rel=\"noopener\">NVIDIA — CUDA downloads ↗</a></li><li><a class=\"ext-link\" href=\"https://brew.sh/\" target=\"_blank\" rel=\"noopener\">Homebrew (macOS) ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 6 (P0)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m006.json or References tab."}]}, {"code": "P1", "name": "AI Foundations", "purpose": "LLMs, transformers, embeddings, ML paradigms", "icon": "🧠", "color": "mc-1", "modules": [{"id": 6, "num": 7, "title": "Top 40 AI Terms & Core Concepts", "tools": "Flashcards, terminology", "priority": "MUST DO", "phase": "P1", "slug": "top-40-ai-terms---core-concepts", "learn": "<div class='content-block'><div class='cb-label'>How to use this module</div><div class='cb-text'><p>Study every term below until you can define it in your own words in under 30 seconds. References at the end are <strong>optional</strong> for deeper reading—not required to complete the module.</p></div></div><div class='content-block'><div class='cb-label'>1 — Core AI concepts</div><div class='cb-text'><dl class='term-list'><dt>AGI (Artificial General Intelligence)</dt><dd>Hypothetical systems that match or exceed human ability across the full range of cognitive tasks, not just a narrow skill. Today’s products are narrow AI; AGI remains a research and safety discussion, not a shipped product category.</dd><dt>AI model</dt><dd>A learned function (usually a large neural network) that maps inputs to outputs after training—e.g. predicting the next token, classifying text, or generating embeddings. “Model” refers to the weights + architecture, not the chat wrapper around it.</dd><dt>Machine learning (ML)</dt><dd>Algorithms that improve from data: the system adjusts parameters to reduce error on examples instead of being fully hand-coded with explicit rules for every case.</dd><dt>Deep learning</dt><dd>ML using neural networks with many layers (deep stacks of linear maps + nonlinearities). Transformers used in LLMs are a deep learning architecture.</dd><dt>Supervised learning</dt><dd>Training on labeled pairs (input, correct output). The model learns to minimize the difference between its predictions and those labels.</dd><dt>Unsupervised learning</dt><dd>Training without per-example labels—e.g. clustering, dimensionality reduction, or learning structure from raw text corpora via next-token prediction at scale.</dd><dt>Reinforcement learning (RL)</dt><dd>An agent learns by taking actions in an environment and receiving rewards or penalties. Used in games and robotics; also related to RLHF used to align LLMs with human preferences.</dd></dl></div></div><div class='content-block'><div class='cb-label'>2 — Inference, context, and behaviour</div><div class='cb-text'><dl class='term-list'><dt>Inference</dt><dd>Running a trained model on new inputs to produce outputs (forward pass). Distinct from training: no weight updates, lower cost profile, what happens in production APIs.</dd><dt>Context</dt><dd>Everything visible to the model in one forward pass: system instructions, tool results, retrieved documents, and conversation turns, usually measured in tokens.</dd><dt>Explainability</dt><dd>Techniques and practices to understand <em>why</em> a model produced an output—from attention visualizations to simpler surrogate models. For LLMs, perfect explainability is still limited; logging, citations (RAG), and structured outputs help in production.</dd><dt>Hallucination</dt><dd>Confident but incorrect or ungrounded content—names, citations, numbers, or APIs that were never in training or retrieval. Mitigated with RAG, tool use, evals, and human review.</dd><dt>RAG (Retrieval-Augmented Generation)</dt><dd>Pipeline: retrieve relevant chunks from a knowledge store, inject them into the prompt, then generate. Grounds answers in your data and reduces guessing on facts.</dd><dt>Chain-of-thought (CoT)</dt><dd>Prompting the model to emit intermediate reasoning steps before a final answer. Improves performance on math, logic, and multi-step tasks when used carefully.</dd><dt>Context window</dt><dd>Maximum tokens the model can attend to in one call. Larger windows allow longer docs and history but increase cost and latency.</dd><dt>Cost per token</dt><dd>Pricing and budgeting unit for hosted LLMs: input tokens + output tokens (and sometimes cached context). Optimisation = shorter prompts, smaller models for easy tasks, batching, caching.</dd></dl></div></div><div class='content-block'><div class='cb-label'>3 — Training, weights, and hardware</div><div class='cb-text'><dl class='term-list'><dt>Fine-tuning</dt><dd>Further training a pre-trained model on a smaller domain-specific dataset to shift style, format, or behaviour—cheaper than training from scratch; often paired with evaluation and safety review.</dd><dt>Prompt engineering</dt><dd>Designing instructions, formats, and examples so the model reliably produces the shape and quality you need—still the highest-ROI lever for many products.</dd><dt>Tokenization</dt><dd>Splitting text into subword units (tokens) the model consumes. Same word can be multiple tokens; token counts drive billing and context limits.</dd><dt>Parameters</dt><dd>Learned numbers inside the network (weights and biases). “7B model” ≈ 7 billion parameters; more parameters usually mean more capacity and higher compute.</dd><dt>Weights</dt><dd>The stored parameter values after training—the actual “knowledge” in a numerical form, loaded at inference.</dd><dt>Embedding</dt><dd>A dense vector representing text (or image, etc.) in a space where similar meanings are closer. Used for search, clustering, and RAG.</dd><dt>Quantization</dt><dd>Representing weights/activations in lower precision (e.g. 8-bit, 4-bit) to shrink memory and speed inference—common for local deployment (GGUF, etc.).</dd><dt>Training data</dt><dd>The corpus used to learn the model. Quality, bias, licensing, and recency of data directly affect behaviour and compliance risk.</dd><dt>GPU</dt><dd>Parallel processor ideal for matrix math in training and inference; dominant hardware for deep learning.</dd><dt>TPU</dt><dd>Google’s ASIC family optimised for large matrix workloads; common on Google Cloud for training/inference pipelines.</dd><dt>Compute (AI)</dt><dd>Collective term for FLOPs, memory bandwidth, and wall-clock time needed to train or serve models—major driver of cost and feasibility.</dd><dt>Transformer</dt><dd>Architecture based on self-attention; parallelises across sequence positions and underpins modern LLMs. Replaced RNN/LSTM dominance for large-scale language modelling.</dd></dl></div></div><div class='content-block'><div class='cb-label'>4 — Tools, protocols, and product surface</div><div class='cb-text'><dl class='term-list'><dt>MCP (Model Context Protocol)</dt><dd>Open standard for exposing tools, resources, and prompts to an MCP host (e.g. a desktop assistant). One structured way to connect models to files, APIs, and databases.</dd><dt>API (in LLM products)</dt><dd>HTTP interface to a hosted model—chat completions, embeddings, speech, etc. Authentication, rate limits, and versioning are production concerns.</dd><dt>Computer vision (CV)</dt><dd>Models that interpret images/video: classification, detection, segmentation, OCR. Often merged with LLMs in multimodal systems.</dd><dt>NLP (Natural Language Processing)</dt><dd>Field covering understanding and generation of human language—LLMs are the dominant NLP stack today.</dd><dt>Chatbot</dt><dd>Product pattern: conversational UI over a model, often with memory, tools, and guardrails—not a distinct model type.</dd><dt>Generative AI</dt><dd>Systems that synthesise new content (text, code, images, audio) from learned patterns, as opposed to only classifying or scoring inputs.</dd><dt>Vibe coding</dt><dd>Informal term for AI-assisted development: you steer natural-language intent while the model drafts code; you still own review, tests, and security.</dd><dt>AI agent</dt><dd>System that combines a model with tools, memory, and a control loop to pursue multi-step goals—not just single-shot Q&amp;A.</dd></dl></div></div><div class='content-block'><div class='cb-label'>5 — Ethics, safety, and governance</div><div class='cb-text'><dl class='term-list'><dt>AI alignment</dt><dd>Research and engineering to make models behave in line with human intent and values—reducing harmful outputs, deception, and misuse.</dd><dt>Training data quality</dt><dd>Accuracy, representativeness, toxicity, PII, and license posture of data. Garbage or biased data produces unreliable or unfair models.</dd><dt>Bias</dt><dd>Systematic skew in outputs that disadvantages groups or viewpoints—often from data and from optimisation targets; needs measurement and mitigation.</dd><dt>Privacy</dt><dd>Protecting personal and sensitive data in training, logging, retrieval, and tool calls (GDPR-style rights, minimisation, retention).</dd><dt>Regulation</dt><dd>Legal frameworks (e.g. EU AI Act, sector rules) governing risk classification, documentation, and deployment constraints for AI systems.</dd></dl></div></div>", "steps": "<ol><li>Read all 40 definitions without skipping. Highlight any term you cannot paraphrase.</li><li>Make a two-column sheet: <strong>Term</strong> | <strong>Your one-sentence definition</strong> — fill it from memory, then self-check against this page.</li><li>Pick five terms that matter most to your target role (e.g. RAG, MCP, hallucination, context window, fine-tuning) and write a short scenario where each appears in a product decision.</li><li>Optional: pair each of those five with a risk (what goes wrong if the team misunderstands the term).</li><li>Run the code sample to see tokenisation in action; relate token counts to “context window” and “cost per token.”</li></ol>", "code": "# Tokenisation demo — ties to: token, context window, cost per token\n# pip install tiktoken\nimport tiktoken\nenc = tiktoken.encoding_for_model(\"gpt-4o\")\ntext = \"RAG reduces hallucinations when retrieval is good.\"\ntokens = enc.encode(text)\nprint(\"Tokens:\", len(tokens))\nprint(\"IDs (first 12):\", tokens[:12])\nprint(\"Decoded round-trip:\", enc.decode(tokens))", "refs": "<p class=\"refs-intro\"><strong>Optional depth only</strong>—the Learn tab definitions are enough to complete this module.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://platform.openai.com/tokenizer\" target=\"_blank\" rel=\"noopener\">OpenAI tokenizer visualiser ↗</a></li><li><a class=\"ext-link\" href=\"https://huggingface.co/learn/llm-course/chapter1/1\" target=\"_blank\" rel=\"noopener\">Hugging Face — LLM course ch.1 ↗</a></li><li><a class=\"ext-link\" href=\"https://jalammar.github.io/illustrated-transformer/\" target=\"_blank\" rel=\"noopener\">The Illustrated Transformer ↗</a></li><li><a class=\"ext-link\" href=\"https://www.ibm.com/think/topics/artificial-intelligence\" target=\"_blank\" rel=\"noopener\">IBM — AI topics primer ↗</a></li><li><a class=\"ext-link\" href=\"https://en.wikipedia.org/wiki/Glossary_of_artificial_intelligence\" target=\"_blank\" rel=\"noopener\">Wikipedia — AI glossary ↗</a></li><li><a class=\"ext-link\" href=\"https://arxiv.org/abs/1706.03762\" target=\"_blank\" rel=\"noopener\">Attention Is All You Need (paper) ↗</a></li><li><a class=\"ext-link\" href=\"https://platform.openai.com/docs/guides/embeddings\" target=\"_blank\" rel=\"noopener\">OpenAI — embeddings guide ↗</a></li><li><a class=\"ext-link\" href=\"https://modelcontextprotocol.io/introduction\" target=\"_blank\" rel=\"noopener\">MCP — introduction ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §2 Image 4 — Top 40 AI Terms; Doc §3 module registry row 7", "coverage_notes": "All 40 terms defined on-page; references optional depth only."}, {"id": 7, "num": 8, "title": "How LLMs Work: Transformers & Tokenization", "tools": "Hugging Face, tiktoken", "priority": "MUST DO", "phase": "P1", "slug": "how-llms-work--transformers---tokenization", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 8 (P1)</strong> — How LLMs Work: Transformers &amp; Tokenization. Tools focus: <em>Hugging Face, tiktoken</em>. Core path — prioritize in your sprint.</p><p>Transformers use self-attention so every position can attend to every other position in parallel — the architectural basis of modern LLMs. Tokenization turns text into subword IDs; context length and cost follow from token counts.</p><p>Connect Hugging Face ecosystem concepts (configs, tokenizers) to what you see in API billing. Optional: load a small tokenizer and inspect how whitespace and punctuation split.</p></div></div>", "steps": "<ol><li>Skim the Illustrated Transformer or HF docs summary; draw a one-page diagram: embedding → layers → logits.</li><li>Run a tokenizer (HF or tiktoken) on three prompt shapes: code, bullet list, long paragraph.</li><li>Compare token counts for the same meaning in verbose vs concise English.</li><li>Note how special tokens (BOS/EOS/pad) appear in your encoder output.</li><li>Write five bullets linking attention to long-context cost in production APIs.</li></ol>", "code": "# Module 8 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 8, \"topic\": \"How LLMs Work: Transformers & Tokenizati\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://huggingface.co/docs/transformers/index\" target=\"_blank\" rel=\"noopener\">Hugging Face Transformers ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/openai/tiktoken\" target=\"_blank\" rel=\"noopener\">tiktoken (OpenAI) ↗</a></li><li><a class=\"ext-link\" href=\"https://jalammar.github.io/illustrated-transformer/\" target=\"_blank\" rel=\"noopener\">Illustrated Transformer ↗</a></li><li><a class=\"ext-link\" href=\"https://huggingface.co/learn/llm-course\" target=\"_blank\" rel=\"noopener\">Hugging Face — LLM course (full) ↗</a></li><li><a class=\"ext-link\" href=\"https://www.3blue1brown.com/topics/neural-networks\" target=\"_blank\" rel=\"noopener\">3Blue1Brown — neural networks ↗</a></li><li><a class=\"ext-link\" href=\"https://distill.pub/\" target=\"_blank\" rel=\"noopener\">Distill.pub ↗</a></li><li><a class=\"ext-link\" href=\"https://developers.google.com/machine-learning/crash-course\" target=\"_blank\" rel=\"noopener\">Google — ML crash course ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 8 (P1)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m008.json or References tab."}, {"id": 8, "num": 9, "title": "Embeddings & Vector Representations", "tools": "OpenAI Embeddings, SBERT", "priority": "MUST DO", "phase": "P1", "slug": "embeddings---vector-representations", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 9 (P1)</strong> — Embeddings &amp; Vector Representations. Tools focus: <em>OpenAI Embeddings, SBERT</em>. Core path — prioritize in your sprint.</p><p>Embeddings map text (or images) into dense vectors so semantic similarity becomes geometry: cosine distance in vector space approximates related meaning. They power retrieval, clustering, and RAG front-ends.</p><p>Contrast OpenAI-style embedding endpoints with open sentence-transformer models you can run locally. Understand normalization, dimensionality, and when to re-embed after model upgrades.</p></div></div>", "steps": "<ol><li>Embed ten short phrases (two similar pairs, one opposite pair) using one API or local model.</li><li>Compute cosine similarity between vectors; sanity-check that related phrases score higher.</li><li>Change one word in a phrase and measure how much the vector shifts.</li><li>Document embedding dimension and model version used — versioning matters for retrieval indexes.</li><li>List one failure mode (polysemy, language mix) and a mitigation (metadata, rerankers).</li></ol>", "code": "pip install chromadb sentence-transformers\nimport chromadb\nc = chromadb.Client(); col = c.create_collection(\"m9\")\ncol.add(documents=[\"RAG retrieves context before generation.\"], ids=[\"a\"])\nprint(col.query(query_texts=[\"What is RAG?\"], n_results=1))", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://platform.openai.com/docs/guides/embeddings\" target=\"_blank\" rel=\"noopener\">OpenAI — embeddings ↗</a></li><li><a class=\"ext-link\" href=\"https://sbert.net/docs/sentence_transformer/usage/usage.html\" target=\"_blank\" rel=\"noopener\">Sentence Transformers ↗</a></li><li><a class=\"ext-link\" href=\"https://huggingface.co/sentence-transformers\" target=\"_blank\" rel=\"noopener\">HF — sentence-transformers ↗</a></li><li><a class=\"ext-link\" href=\"https://huggingface.co/learn/llm-course\" target=\"_blank\" rel=\"noopener\">Hugging Face — LLM course (full) ↗</a></li><li><a class=\"ext-link\" href=\"https://www.3blue1brown.com/topics/neural-networks\" target=\"_blank\" rel=\"noopener\">3Blue1Brown — neural networks ↗</a></li><li><a class=\"ext-link\" href=\"https://distill.pub/\" target=\"_blank\" rel=\"noopener\">Distill.pub ↗</a></li><li><a class=\"ext-link\" href=\"https://developers.google.com/machine-learning/crash-course\" target=\"_blank\" rel=\"noopener\">Google — ML crash course ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 9 (P1)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m009.json or References tab."}, {"id": 9, "num": 10, "title": "Inference, Context Windows & Cost Optimisation", "tools": "Token counters, model APIs", "priority": "MUST DO", "phase": "P1", "slug": "inference--context-windows---cost-optimisation", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 10 (P1)</strong> — Inference, Context Windows &amp; Cost Optimisation. Tools focus: <em>Token counters, model APIs</em>. Core path — prioritize in your sprint.</p><p>Inference is the forward pass at serving time — distinct from training. Context windows cap how much text fits in one call; providers bill input and output tokens separately, and long prompts hit latency and cost cliffs.</p><p>Practice measuring tokens before send, trimming history, summarizing threads, and choosing smaller models for easy subtasks.</p></div></div>", "steps": "<ol><li>Pick a tokenizer or API metadata; measure tokens for a long thread before and after summarization.</li><li>Call a chat model with the same task using a large vs small model; compare cost and latency.</li><li>Implement a simple token budget guard that refuses or compresses when over a threshold.</li><li>Read provider docs for max context and output limits; note what happens on overflow.</li><li>Write a stakeholder-friendly paragraph explaining why “bigger context” is not free.</li></ol>", "code": "# Module 10 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 10, \"topic\": \"Inference, Context Windows & Cost Optimi\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://platform.openai.com/docs/models\" target=\"_blank\" rel=\"noopener\">OpenAI — models ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.anthropic.com/en/docs/about-claude/models\" target=\"_blank\" rel=\"noopener\">Anthropic — models & pricing ↗</a></li><li><a class=\"ext-link\" href=\"https://huggingface.co/docs/transformers/tokenizer_summary\" target=\"_blank\" rel=\"noopener\">Tokenization — HF ↗</a></li><li><a class=\"ext-link\" href=\"https://huggingface.co/learn/llm-course\" target=\"_blank\" rel=\"noopener\">Hugging Face — LLM course (full) ↗</a></li><li><a class=\"ext-link\" href=\"https://www.3blue1brown.com/topics/neural-networks\" target=\"_blank\" rel=\"noopener\">3Blue1Brown — neural networks ↗</a></li><li><a class=\"ext-link\" href=\"https://distill.pub/\" target=\"_blank\" rel=\"noopener\">Distill.pub ↗</a></li><li><a class=\"ext-link\" href=\"https://developers.google.com/machine-learning/crash-course\" target=\"_blank\" rel=\"noopener\">Google — ML crash course ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 10 (P1)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m010.json or References tab."}, {"id": 10, "num": 11, "title": "Quantization & Model Efficiency", "tools": "GGUF, GPTQ, bitsandbytes", "priority": "OPTIONAL", "phase": "P1", "slug": "quantization---model-efficiency", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 11 (P1)</strong> — Quantization &amp; Model Efficiency. Tools focus: <em>GGUF, GPTQ, bitsandbytes</em>. Optional depth — revisit when you need this specialty.</p><p>Quantization reduces weight precision (e.g. FP16 → INT8 → 4-bit) to shrink memory and speed inference. GGUF bundles for llama.cpp, GPTQ, and bitsandbytes QLoRA during training are common touchpoints.</p><p>Understand accuracy vs size trade-offs and why quantized models behave slightly differently on code or math.</p></div></div>", "steps": "<ol><li>Read one official guide each for GGUF inference vs training-time quantization (QLoRA).</li><li>Run one pre-quantized model locally; note RAM/VRAM vs full precision expectations.</li><li>List three metrics you would monitor if you switched quantization in production (latency, perplexity, task evals).</li><li>Identify a task where low-bit quantization might fail (e.g. long arithmetic) and test informally.</li><li>Summarize when you would quantize for edge deployment vs keep FP16 in cloud.</li></ol>", "code": "# Module 11 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 11, \"topic\": \"Quantization & Model Efficiency\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://huggingface.co/docs/transformers/main_classes/quantization\" target=\"_blank\" rel=\"noopener\">HF — quantization ↗</a></li><li><a class=\"ext-link\" href=\"https://huggingface.co/docs/bitsandbytes/main\" target=\"_blank\" rel=\"noopener\">bitsandbytes ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/ggerganov/llama.cpp/blob/master/README.md\" target=\"_blank\" rel=\"noopener\">GGUF overview ↗</a></li><li><a class=\"ext-link\" href=\"https://huggingface.co/learn/llm-course\" target=\"_blank\" rel=\"noopener\">Hugging Face — LLM course (full) ↗</a></li><li><a class=\"ext-link\" href=\"https://www.3blue1brown.com/topics/neural-networks\" target=\"_blank\" rel=\"noopener\">3Blue1Brown — neural networks ↗</a></li><li><a class=\"ext-link\" href=\"https://distill.pub/\" target=\"_blank\" rel=\"noopener\">Distill.pub ↗</a></li><li><a class=\"ext-link\" href=\"https://developers.google.com/machine-learning/crash-course\" target=\"_blank\" rel=\"noopener\">Google — ML crash course ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 11 (P1)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m011.json or References tab."}, {"id": 11, "num": 12, "title": "GPU/TPU & Compute for AI", "tools": "CUDA, Colab, RunPod", "priority": "OPTIONAL", "phase": "P1", "slug": "gpu-tpu---compute-for-ai", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 12 (P1)</strong> — GPU/TPU &amp; Compute for AI. Tools focus: <em>CUDA, Colab, RunPod</em>. Optional depth — revisit when you need this specialty.</p><p>GPUs parallelize matrix multiply for training and inference; TPUs are Google’s ASIC line for large matmul workloads. Colab and cloud pods abstract hardware, but data movement and memory bandwidth still dominate.</p><p>Map a simple training or inference job to GPU memory usage — batch size, sequence length, and precision interact.</p></div></div>", "steps": "<ol><li>List differences between latency-sensitive inference and throughput-heavy training on GPUs.</li><li>Spin up one GPU notebook or pod; run a tiny matmul or model forward pass; note device name and memory.</li><li>Read vendor docs for one TPU offering; compare programming model to CUDA briefly.</li><li>Estimate rough VRAM needs for a model size you care about (parameters × precision heuristic).</li><li>Document one operational issue: driver mismatch, OOM, or cold start — and the fix.</li></ol>", "code": "# Module 12 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 12, \"topic\": \"GPU/TPU & Compute for AI\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://docs.nvidia.com/cuda/\" target=\"_blank\" rel=\"noopener\">NVIDIA CUDA ↗</a></li><li><a class=\"ext-link\" href=\"https://colab.research.google.com/\" target=\"_blank\" rel=\"noopener\">Google Colab ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.runpod.io/\" target=\"_blank\" rel=\"noopener\">RunPod docs ↗</a></li><li><a class=\"ext-link\" href=\"https://huggingface.co/learn/llm-course\" target=\"_blank\" rel=\"noopener\">Hugging Face — LLM course (full) ↗</a></li><li><a class=\"ext-link\" href=\"https://www.3blue1brown.com/topics/neural-networks\" target=\"_blank\" rel=\"noopener\">3Blue1Brown — neural networks ↗</a></li><li><a class=\"ext-link\" href=\"https://distill.pub/\" target=\"_blank\" rel=\"noopener\">Distill.pub ↗</a></li><li><a class=\"ext-link\" href=\"https://developers.google.com/machine-learning/crash-course\" target=\"_blank\" rel=\"noopener\">Google — ML crash course ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 12 (P1)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m012.json or References tab."}, {"id": 12, "num": 13, "title": "ML Paradigms: Supervised, Unsupervised, RL", "tools": "scikit-learn, OpenAI Gym", "priority": "MUST DO", "phase": "P1", "slug": "ml-paradigms--supervised--unsupervised--rl", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 13 (P1)</strong> — ML Paradigms: Supervised, Unsupervised, RL. Tools focus: <em>scikit-learn, OpenAI Gym</em>. Core path — prioritize in your sprint.</p><p>Supervised learning fits labeled pairs; unsupervised structure learns without per-example labels; RL optimizes policies via rewards. Generative models (including LLMs) are often pretrained with self-supervised next-token objectives.</p><p>Place LLM fine-tuning and RLHF in this map so you can explain trade-offs to non-specialists.</p></div></div>", "steps": "<ol><li>For each paradigm, write one real-world example (not toy XOR) relevant to business data.</li><li>Run a minimal sklearn supervised example; note fit/predict vs generative “generate” APIs.</li><li>Explain why RLHF is related to RL but not the same as classic game-playing RL.</li><li>List where unsupervised embeddings appear in your RAG or search roadmap.</li><li>Create a comparison table: data needs, evaluation, and typical risk for each paradigm.</li></ol>", "code": "# Module 13 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 13, \"topic\": \"ML Paradigms: Supervised, Unsupervised, \", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://scikit-learn.org/stable/\" target=\"_blank\" rel=\"noopener\">scikit-learn ↗</a></li><li><a class=\"ext-link\" href=\"https://gymnasium.farama.org/\" target=\"_blank\" rel=\"noopener\">Gymnasium (RL envs) ↗</a></li><li><a class=\"ext-link\" href=\"https://huggingface.co/learn/llm-course\" target=\"_blank\" rel=\"noopener\">Hugging Face — LLM course (full) ↗</a></li><li><a class=\"ext-link\" href=\"https://www.3blue1brown.com/topics/neural-networks\" target=\"_blank\" rel=\"noopener\">3Blue1Brown — neural networks ↗</a></li><li><a class=\"ext-link\" href=\"https://distill.pub/\" target=\"_blank\" rel=\"noopener\">Distill.pub ↗</a></li><li><a class=\"ext-link\" href=\"https://developers.google.com/machine-learning/crash-course\" target=\"_blank\" rel=\"noopener\">Google — ML crash course ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 13 (P1)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m013.json or References tab."}, {"id": 13, "num": 14, "title": "Generative AI Pipeline (Input→Process→Output)", "tools": "OpenAI API, LangChain", "priority": "MUST DO", "phase": "P1", "slug": "generative-ai-pipeline--input-process-output", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 14 (P1)</strong> — Generative AI Pipeline (Input→Process→Output). Tools focus: <em>OpenAI API, LangChain</em>. Core path — prioritize in your sprint.</p><p>A generative pipeline moves from prompt or UI input through preprocessing, model call, optional tools/RAG, post-processing, and logging. Reliability comes from contracts at each hop — schemas, timeouts, and fallbacks.</p><p>Sketch your own diagram for a support-bot vs a batch summariser; identify different bottlenecks.</p></div></div>", "steps": "<ol><li>Draw input→process→output for one product idea; annotate trust boundaries and PII touchpoints.</li><li>Implement a toy pipeline in Python: validate input → call model → validate output JSON.</li><li>Add structured logging at each stage without logging secrets or user content raw.</li><li>Identify two stages where caching would help and what invalidation policy you need.</li><li>Write acceptance criteria for “done” that include latency and error-rate SLOs.</li></ol>", "code": "# Module 14 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 14, \"topic\": \"Generative AI Pipeline (Input→Process→Ou\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://platform.openai.com/docs/quickstart\" target=\"_blank\" rel=\"noopener\">OpenAI — quickstart ↗</a></li><li><a class=\"ext-link\" href=\"https://python.langchain.com/docs/concepts/\" target=\"_blank\" rel=\"noopener\">LangChain — overview ↗</a></li><li><a class=\"ext-link\" href=\"https://huggingface.co/learn/llm-course\" target=\"_blank\" rel=\"noopener\">Hugging Face — LLM course (full) ↗</a></li><li><a class=\"ext-link\" href=\"https://www.3blue1brown.com/topics/neural-networks\" target=\"_blank\" rel=\"noopener\">3Blue1Brown — neural networks ↗</a></li><li><a class=\"ext-link\" href=\"https://distill.pub/\" target=\"_blank\" rel=\"noopener\">Distill.pub ↗</a></li><li><a class=\"ext-link\" href=\"https://developers.google.com/machine-learning/crash-course\" target=\"_blank\" rel=\"noopener\">Google — ML crash course ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 14 (P1)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m014.json or References tab."}]}, {"code": "P2", "name": "Prompt Engineering", "purpose": "The primary interface to models", "icon": "✍️", "color": "mc-2", "modules": [{"id": 14, "num": 15, "title": "Prompt Engineering Fundamentals", "tools": "Claude, GPT-4, PromptPerfect", "priority": "MUST DO", "phase": "P2", "slug": "prompt-engineering-fundamentals", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 15 (P2)</strong> — Prompt Engineering Fundamentals. Tools focus: <em>Claude, GPT-4, PromptPerfect</em>. Core path — prioritize in your sprint.</p><p>Prompt engineering is the highest-ROI lever before changing models: clarity, format, examples (few-shot), and role framing steer behaviour more cheaply than fine-tunes for many tasks.</p><p>Practice rewriting vague prompts into instructions with constraints, output format (JSON/Markdown), and evaluation rubrics you can automate later.</p></div></div>", "steps": "<ol><li>Take one business task; write a bad prompt, then two improved iterations with explicit format.</li><li>Add a negative constraint (“do not”) and verify the model respects it on five trials.</li><li>Compare zero-shot vs two-shot for a structured extraction task; score with a simple checklist.</li><li>Document temperature and max-tokens choices and why they fit this task.</li><li>Peer-review another learner’s prompt for ambiguity; revise together.</li></ol>", "code": "# Module 15 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 15, \"topic\": \"Prompt Engineering Fundamentals\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview\" target=\"_blank\" rel=\"noopener\">Anthropic — prompt engineering ↗</a></li><li><a class=\"ext-link\" href=\"https://platform.openai.com/docs/guides/prompt-engineering\" target=\"_blank\" rel=\"noopener\">OpenAI — prompting guide ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/openai/openai-cookbook\" target=\"_blank\" rel=\"noopener\">OpenAI — cookbook (GitHub) ↗</a></li><li><a class=\"ext-link\" href=\"https://cloud.google.com/vertex-ai/generative-ai/docs/learn/prompts/introduction-prompt-design\" target=\"_blank\" rel=\"noopener\">Google Cloud — prompt design ↗</a></li><li><a class=\"ext-link\" href=\"https://lilianweng.github.io/posts/2023-03-15-prompt-engineering/\" target=\"_blank\" rel=\"noopener\">Lilian Weng — LLM survey ↗</a></li><li><a class=\"ext-link\" href=\"https://www.promptingguide.ai/\" target=\"_blank\" rel=\"noopener\">PromptingGuide.ai ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 15 (P2)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m015.json or References tab."}, {"id": 15, "num": 16, "title": "Chain-of-Thought (CoT) Prompting", "tools": "GPT-4o, Claude, Gemini", "priority": "MUST DO", "phase": "P2", "slug": "chain-of-thought--cot--prompting", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 16 (P2)</strong> — Chain-of-Thought (CoT) Prompting. Tools focus: <em>GPT-4o, Claude, Gemini</em>. Core path — prioritize in your sprint.</p><p>Chain-of-thought elicits intermediate reasoning before answers, improving multi-step math and logic when the model is instructed to show steps — but increases tokens and can leak verbose internals.</p><p>Learn when to keep reasoning hidden from end users vs when to display it for auditability.</p></div></div>", "steps": "<ol><li>Solve five numeric word problems with and without CoT; compare accuracy.</li><li>Ask for explicit “final answer in a box” after reasoning to separate UI from chain.</li><li>Measure token increase from CoT; decide if cost is justified per task.</li><li>Try a self-consistency variant (multiple chains, vote) on one hard puzzle.</li><li>Note one failure mode (overconfident wrong chain) and a guardrail.</li></ol>", "code": "# Module 16 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 16, \"topic\": \"Chain-of-Thought (CoT) Prompting\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://platform.openai.com/docs/guides/reasoning\" target=\"_blank\" rel=\"noopener\">OpenAI — reasoning models ↗</a></li><li><a class=\"ext-link\" href=\"https://cloud.google.com/discover/what-is-chain-of-thought-prompting\" target=\"_blank\" rel=\"noopener\">Chain-of-thought (Google Cloud) ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/openai/openai-cookbook\" target=\"_blank\" rel=\"noopener\">OpenAI — cookbook (GitHub) ↗</a></li><li><a class=\"ext-link\" href=\"https://cloud.google.com/vertex-ai/generative-ai/docs/learn/prompts/introduction-prompt-design\" target=\"_blank\" rel=\"noopener\">Google Cloud — prompt design ↗</a></li><li><a class=\"ext-link\" href=\"https://lilianweng.github.io/posts/2023-03-15-prompt-engineering/\" target=\"_blank\" rel=\"noopener\">Lilian Weng — LLM survey ↗</a></li><li><a class=\"ext-link\" href=\"https://www.promptingguide.ai/\" target=\"_blank\" rel=\"noopener\">PromptingGuide.ai ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 16 (P2)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m016.json or References tab."}, {"id": 16, "num": 17, "title": "Context Management & Context Window", "tools": "LangChain Memory, Claude 200K", "priority": "MUST DO", "phase": "P2", "slug": "context-management---context-window", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 17 (P2)</strong> — Context Management &amp; Context Window. Tools focus: <em>LangChain Memory, Claude 200K</em>. Core path — prioritize in your sprint.</p><p>Context management is how you fit history, documents, and tool results under a finite window: summarization, sliding windows, and structured memory objects. Long-context models reduce pressure but not cost.</p><p>Implement a policy for what stays verbatim vs summarized in a conversational agent.</p></div></div>", "steps": "<ol><li>Simulate a 20-turn chat; count tokens cumulatively with a tokenizer.</li><li>Apply a summarise-every-N-turns policy; check information retention on a quiz.</li><li>Compare “full history” vs “summary + last K turns” on task success.</li><li>Read provider notes on prompt caching where applicable; note billing impact.</li><li>Write rules for when to reset context vs fork a new session.</li></ol>", "code": "# Module 17 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 17, \"topic\": \"Context Management & Context Window\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://python.langchain.com/docs/concepts/memory/\" target=\"_blank\" rel=\"noopener\">LangChain — memory ↗</a></li><li><a class=\"ext-link\" href=\"https://docs.anthropic.com/en/docs/build-with-claude/context-windows\" target=\"_blank\" rel=\"noopener\">Anthropic — long context ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/openai/openai-cookbook\" target=\"_blank\" rel=\"noopener\">OpenAI — cookbook (GitHub) ↗</a></li><li><a class=\"ext-link\" href=\"https://cloud.google.com/vertex-ai/generative-ai/docs/learn/prompts/introduction-prompt-design\" target=\"_blank\" rel=\"noopener\">Google Cloud — prompt design ↗</a></li><li><a class=\"ext-link\" href=\"https://lilianweng.github.io/posts/2023-03-15-prompt-engineering/\" target=\"_blank\" rel=\"noopener\">Lilian Weng — LLM survey ↗</a></li><li><a class=\"ext-link\" href=\"https://www.promptingguide.ai/\" target=\"_blank\" rel=\"noopener\">PromptingGuide.ai ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 17 (P2)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m017.json or References tab."}, {"id": 17, "num": 18, "title": "Multi-Agent & Goal-Oriented Prompts", "tools": "CrewAI, AutoGen", "priority": "MUST DO", "phase": "P2", "slug": "multi-agent---goal-oriented-prompts", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 18 (P2)</strong> — Multi-Agent &amp; Goal-Oriented Prompts. Tools focus: <em>CrewAI, AutoGen</em>. Core path — prioritize in your sprint.</p><p>Multi-agent prompting assigns roles (researcher, critic, writer) and coordinates hand-offs. Frameworks like CrewAI or AutoGen encode patterns, but the design principles are delegation, clear interfaces, and stop conditions.</p><p>Focus on avoiding infinite chatter: budgets for rounds and explicit termination.</p></div></div>", "steps": "<ol><li>Design three roles for one task; specify inputs/outputs per role as JSON fields.</li><li>Run a minimal two-agent exchange in code or a framework; cap at three rounds.</li><li>Log each hand-off; verify no duplicate work or contradictory assumptions.</li><li>Add a critic step that checks format before final user-visible output.</li><li>Retrospective: when would a single-agent prompt be simpler and safer?</li></ol>", "code": "# Module 18 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 18, \"topic\": \"Multi-Agent & Goal-Oriented Prompts\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://docs.crewai.com/en/introduction\" target=\"_blank\" rel=\"noopener\">CrewAI docs ↗</a></li><li><a class=\"ext-link\" href=\"https://microsoft.github.io/autogen/stable/\" target=\"_blank\" rel=\"noopener\">Microsoft AutoGen ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/openai/openai-cookbook\" target=\"_blank\" rel=\"noopener\">OpenAI — cookbook (GitHub) ↗</a></li><li><a class=\"ext-link\" href=\"https://cloud.google.com/vertex-ai/generative-ai/docs/learn/prompts/introduction-prompt-design\" target=\"_blank\" rel=\"noopener\">Google Cloud — prompt design ↗</a></li><li><a class=\"ext-link\" href=\"https://lilianweng.github.io/posts/2023-03-15-prompt-engineering/\" target=\"_blank\" rel=\"noopener\">Lilian Weng — LLM survey ↗</a></li><li><a class=\"ext-link\" href=\"https://www.promptingguide.ai/\" target=\"_blank\" rel=\"noopener\">PromptingGuide.ai ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 18 (P2)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m018.json or References tab."}, {"id": 18, "num": 19, "title": "Self-Critique, Retry Loops & Reflexion", "tools": "LangGraph, custom Python", "priority": "MUST DO", "phase": "P2", "slug": "self-critique--retry-loops---reflexion", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 19 (P2)</strong> — Self-Critique, Retry Loops &amp; Reflexion. Tools focus: <em>LangGraph, custom Python</em>. Core path — prioritize in your sprint.</p><p>Self-critique and reflexion patterns ask the model to evaluate its draft and revise. LangGraph and custom loops implement retries with state — production needs limits to avoid runaway spend.</p></div></div>", "steps": "<ol><li>Implement generate→critique→revise for one writing task; stop after two revisions max.</li><li>Compare single-pass vs two-pass quality using a rubric you define.</li><li>Instrument token usage per revision; plot cost vs gain.</li><li>Handle critique refusal or empty output gracefully in code.</li><li>Document when reflexion is inappropriate (latency-sensitive chat).</li></ol>", "code": "# Module 19 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 19, \"topic\": \"Self-Critique, Retry Loops & Reflexion\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://docs.langchain.com/oss/python/langgraph/overview\" target=\"_blank\" rel=\"noopener\">LangGraph — overview ↗</a></li><li><a class=\"ext-link\" href=\"https://arxiv.org/abs/2303.11366\" target=\"_blank\" rel=\"noopener\">Reflexion (paper) ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/openai/openai-cookbook\" target=\"_blank\" rel=\"noopener\">OpenAI — cookbook (GitHub) ↗</a></li><li><a class=\"ext-link\" href=\"https://cloud.google.com/vertex-ai/generative-ai/docs/learn/prompts/introduction-prompt-design\" target=\"_blank\" rel=\"noopener\">Google Cloud — prompt design ↗</a></li><li><a class=\"ext-link\" href=\"https://lilianweng.github.io/posts/2023-03-15-prompt-engineering/\" target=\"_blank\" rel=\"noopener\">Lilian Weng — LLM survey ↗</a></li><li><a class=\"ext-link\" href=\"https://www.promptingguide.ai/\" target=\"_blank\" rel=\"noopener\">PromptingGuide.ai ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 19 (P2)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m019.json or References tab."}, {"id": 19, "num": 20, "title": "Task Planning Prompts & Role Prompting", "tools": "Claude, GPT-4, Perplexity", "priority": "MUST DO", "phase": "P2", "slug": "task-planning-prompts---role-prompting", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 20 (P2)</strong> — Task Planning Prompts &amp; Role Prompting. Tools focus: <em>Claude, GPT-4, Perplexity</em>. Core path — prioritize in your sprint.</p><p>Task planning prompts decompose goals into ordered steps; role prompting sets expertise and tone. Combine with explicit tool lists when the model should choose actions.</p></div></div>", "steps": "<ol><li>Write a planner prompt that outputs a numbered plan only (no execution).</li><li>Feed the plan to an executor prompt; check step adherence on a simple project.</li><li>Swap roles (junior vs principal) and note behaviour changes.</li><li>Add a checklist the model must tick before claiming completion.</li><li>Capture one derailment (skipped step) and tighten the prompt.</li></ol>", "code": "# Module 20 — hands-on checkpoint\ndef deliverable() -> dict:\n    \"\"\"Return a tiny artifact proving you practiced this module.\"\"\"\n    return {\"module\": 20, \"topic\": \"Task Planning Prompts & Role Prompting\", \"status\": \"practiced\"}\n\nif __name__ == \"__main__\":\n    print(deliverable())", "refs": "<p class=\"refs-intro\">Official documentation, specs, and trusted tutorials. Use these when you want depth beyond this page—none are required to mark the module complete.</p><ul class=\"refs-list\"><li><a class=\"ext-link\" href=\"https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/claude-4-best-practices\" target=\"_blank\" rel=\"noopener\">Anthropic — best practices ↗</a></li><li><a class=\"ext-link\" href=\"https://github.com/openai/openai-cookbook\" target=\"_blank\" rel=\"noopener\">OpenAI — cookbook (GitHub) ↗</a></li><li><a class=\"ext-link\" href=\"https://cloud.google.com/vertex-ai/generative-ai/docs/learn/prompts/introduction-prompt-design\" target=\"_blank\" rel=\"noopener\">Google Cloud — prompt design ↗</a></li><li><a class=\"ext-link\" href=\"https://lilianweng.github.io/posts/2023-03-15-prompt-engineering/\" target=\"_blank\" rel=\"noopener\">Lilian Weng — LLM survey ↗</a></li><li><a class=\"ext-link\" href=\"https://www.promptingguide.ai/\" target=\"_blank\" rel=\"noopener\">PromptingGuide.ai ↗</a></li><li><a class=\"ext-link\" href=\"https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API\" target=\"_blank\" rel=\"noopener\">MDN — Fetch API ↗</a></li><li><a class=\"ext-link\" href=\"https://www.json.org/json-en.html\" target=\"_blank\" rel=\"noopener\">JSON.org — specification ↗</a></li><li><a class=\"ext-link\" href=\"https://yaml.org/spec/\" target=\"_blank\" rel=\"noopener\">YAML — language spec ↗</a></li><li><a class=\"ext-link\" href=\"https://www.w3.org/standards/\" target=\"_blank\" rel=\"noopener\">W3C — Web standards ↗</a></li><li><a class=\"ext-link\" href=\"https://www.rfc-editor.org/\" target=\"_blank\" rel=\"noopener\">IETF — RFC editor ↗</a></li><li><a class=\"ext-link\" href=\"https://www.unicode.org/standard/standard.html\" target=\"_blank\" rel=\"noopener\">Unicode — standard ↗</a></li><li><a class=\"ext-link\" href=\"https://arxiv.org/\" target=\"_blank\" rel=\"noopener\">arXiv — preprints ↗</a></li><li><a class=\"ext-link\" href=\"https://archive.org/\" target=\"_blank\" rel=\"noopener\">Internet Archive ↗</a></li></ul>", "content_tier": "full", "blueprint_ref": "Doc §3 registry — module 20 (P2)", "coverage_notes": "Primary learning on-page (Learn/Steps/Code); optional depth via content/modules/m020.json or References tab."}, {"id": 20, "num": 21, "title": "Prompt Chaining & Advanced Techniques", "tools": "LangChain, LangGraph, LCEL", "priority": "MUST DO", "phase": "P2", "slug": "prompt-chaining---advanced-techniques", "learn": "<div class='content-block'><div class='cb-label'>Overview</div><div class='cb-text'><p><strong>Module 21 (P2)</strong> — Prompt Chaining &amp; Advanced Techniques. Tools focus: <em>LangChain, LangGraph, LCEL</em>. Core path — prioritize in your sprint.</p><p>Prompt chaining composes LCEL or LangGraph nodes so each stage has a contract. Advanced techniques include routing, parallel branches, and structured outputs between hops.</p></div></div>", "steps": "<ol><li>Build a three-node chain: extract → transform → generate; validate JSON between nodes.</li><li>Add a conditional branch on extracted intent; test two paths.</li><li>Measure end-to-end latency vs monolithic prompt.</li><li>Version prompts separately per node; document compatibility.</li><li>List failure modes per hop and corresponding fallbacks.</l
