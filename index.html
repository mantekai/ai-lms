<!DOCTYPE html>
<!-- AI Master Tracker: single HTML5 shell; curriculum + tabs load from data/*.json and data/catalog/*.csv. Manish.AI -->
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Master Tracker — Learning OS</title>
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div id="app-loading">Loading curriculum and catalog…</div>
<div id="overlay" onclick="toggleSidebar()"></div>

<nav id="sidebar">
  <div class="sb-logo" role="button" tabindex="0" title="Dashboard" onclick="showPage('dashboard')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();showPage('dashboard');}">
    <div class="sb-logo-icon">🧠</div>
    <div>
      <div class="sb-logo-text">AI Master Tracker</div>
      <div class="sb-logo-sub">133 modules · data/catalog CSVs</div>
    </div>
  </div>
  <div class="sb-prog">
    <div class="sb-prog-label">Overall Progress <span id="sb-pct">0%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="sb-fill" style="width:0%"></div></div>
  </div>
  <div id="sb-nav"></div>
  <div class="sb-footer">
    <div class="sb-actions">
      <button class="sb-btn" onclick="exportJSON()">⬇ JSON</button>
      <label class="sb-btn" style="cursor:pointer">⬆ JSON<input type="file" accept=".json,application/json" style="display:none" onchange="importJSON(event)"></label>
      <button class="sb-btn" onclick="exportCSV()">⬇ CSV</button>
      <label class="sb-btn" style="cursor:pointer">⬆ CSV<input type="file" accept=".csv,text/csv" style="display:none" onchange="importCSV(event)"></label>
      <button class="sb-btn" onclick="exportModulesProgressCsv()">⬇ Progress</button>
      <label class="sb-btn" style="cursor:pointer">⬆ Progress<input type="file" accept=".csv,text/csv" style="display:none" onchange="importModulesProgressCsv(event)"></label>
      <button class="sb-btn danger" onclick="confirmReset()">↺ Reset</button>
    </div>
    v9 · 133 modules · serve over HTTP for fetch()
  </div>
</nav>

<div id="shell">
  <div id="topbar">
    <button class="toggle-btn" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
    <div class="topbar-title" id="topbar-title">AI Master Tracker</div>
    <div class="topbar-right">
      <div class="theme-wrap">
        <button class="theme-trigger" onclick="toggleThemeDD()">🎨 Theme ▾</button>
        <div class="theme-dropdown" id="themeDD">
          <div class="theme-opt" data-theme="dark" onclick="setTheme('dark')">🌙 Dark</div>
          <div class="theme-opt" data-theme="light" onclick="setTheme('light')">☀️ Light</div>
          <div class="theme-opt" data-theme="ocean" onclick="setTheme('ocean')">🌊 Ocean</div>
          <div class="theme-opt" data-theme="mint" onclick="setTheme('mint')">🌿 Mint</div>
          <div class="theme-opt" data-theme="sunset" onclick="setTheme('sunset')">🌅 Sunset</div>
        </div>
      </div>
      <button class="topbar-action" onclick="exportJSON()">⬇ JSON</button>
      <label class="topbar-action" style="cursor:pointer">⬆ JSON<input type="file" accept=".json,application/json" style="display:none" onchange="importJSON(event)"></label>
      <button class="topbar-action" onclick="exportCSV()">⬇ CSV</button>
      <label class="topbar-action" style="cursor:pointer">⬆ CSV<input type="file" accept=".csv,text/csv" style="display:none" onchange="importCSV(event)"></label>
      <button class="topbar-action" onclick="exportModulesProgressCsv()">⬇ Progress CSV</button>
      <label class="topbar-action" style="cursor:pointer">⬆ Progress CSV<input type="file" accept=".csv,text/csv" style="display:none" onchange="importModulesProgressCsv(event)"></label>
    </div>
  </div>
  <main id="main">
    <div id="page-dashboard" class="page active"></div>
    <div id="page-modules" class="page"></div>
    <div id="page-capstone" class="page"></div>
    <div id="page-hackathons" class="page"></div>
    <div id="page-opensource" class="page"></div>
    <div id="page-yc" class="page"></div>
    <div id="page-certs" class="page"></div>
    <div id="page-coverage" class="page"></div>
    <div id="page-career" class="page"></div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script src="assets/js/app.js"></script>
</body>
</html>
